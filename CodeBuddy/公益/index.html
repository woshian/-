// ==================== MenuScene ====================
class MenuScene extends Phaser.Scene {
    constructor() { super({ key: 'MenuScene' }); }

    create() {
        var W = this.cameras.main.width;
        var H = this.cameras.main.height;

        // 深色背景 + 渐变效果
        var bg = this.add.graphics();
        bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x16213e, 0x16213e);
        bg.fillRect(0, 0, W, H);
        // 装饰性色块
        bg.fillStyle(0x4CAF50, 0.08);
        bg.fillCircle(W * 0.8, H * 0.12, 240);
        bg.fillStyle(0xFFD93D, 0.05);
        bg.fillCircle(W * 0.15, H * 0.88, 200);

        // 时间币展示（如果有的话）
        if (GS.coins > 0) {
            this.add.image(40, 40, 'coin').setScale(1.6);
            this.add.text(75, 28, '× ' + GS.coins, {
                fontSize: '28px', fontStyle: 'bold', color: '#FFD93D'
            });
        }

        // 老人角色 — 居中偏上，更大更显眼
        var elder = this.add.image(W / 2, 330, 'elder').setScale(3.2);
        this.tweens.add({
            targets: elder, y: 320, duration: 2200,
            yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });

        // 标题
        this.add.text(W / 2, 520, '时 间 银 行', {
            fontSize: '64px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5);

        // 副标题
        this.add.text(W / 2, 590, '— 在衰老中体验 · 在共鸣中行动 —', {
            fontSize: '20px', color: '#8888AA'
        }).setOrigin(0.5);

        // 说明文字
        var modeDesc = GS.finaleCompleted
            ? '你已经完成了全部章节。回顾体验，了解真实的适老化知识。'
            : '五章渐进体验：视觉老化 → 听觉衰退 → 记忆模糊 → 物品记忆 → 认知扭曲 → 共鸣揭示';
        this.add.text(W / 2, 640, modeDesc, {
            fontSize: '15px', color: '#666688', wordWrap: { width: 640 }, align: 'center'
        }).setOrigin(0.5);

        // 章节进度（游戏进行中）
        var hasProgress = (GS.totalHits > 0 || GS.chapter > 1) && !GS.finaleCompleted;
        if (hasProgress) {
            var chap = CHAPTERS[Math.min(GS.chapter - 1, 4)];
            this.add.text(W / 2, 670, '📖 ' + chap.name + ' — 进度 ' + GS.chapterRound + '/' + chap.rounds, {
                fontSize: '16px', color: '#4CAF50'
            }).setOrigin(0.5);
        }

        // 按钮布局 — 从屏幕 68% 处开始
        var btnY = 740;
        var rowH = 90; // 行间距

        // 开始/继续按钮
        var isContinue = hasProgress;
        var startLabel = isContinue ? '▶ 继续挑战' : '🕹️  开 始 挑 战';
        var startBtn = this.add.image(W / 2, btnY, 'btn_big').setInteractive({ useHandCursor: true });
        this.add.text(W / 2, btnY, startLabel, {
            fontSize: '26px', fontStyle: 'bold', color: '#FFFFFF'
        }).setOrigin(0.5);

        var self = this;
        startBtn.on('pointerover', function() { startBtn.setScale(1.05); });
        startBtn.on('pointerout',  function() { startBtn.setScale(1.0); });
        startBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(350);
            self.time.delayedCall(350, function() {
                if (isContinue) {
                    self.scene.start('GameScene');
                } else {
                    GS.chapter = 1;
                    GS.chapterRound = 0;
                    GS.level = 1;
                    GS.totalHits = 0;
                    GS.totalMisses = 0;
                    GS.coins = 0;
                    var ch1 = CHAPTERS[0];
                    self.scene.start('ChapterNarrativeScene', {
                        mode: 'intro',
                        chapter: ch1,
                        chapterId: 1,
                        nextScene: 'GameScene',
                        lines: ch1.introLines
                    });
                }
            });
        });

        // 第二行：商城 + 知识卡片（并排，btn_med，间距适配 260px 宽按钮）
        var r2 = btnY + rowH;
        var shopBtn = this.add.image(W / 2 - 150, r2, 'btn_med').setInteractive({ useHandCursor: true });
        this.add.text(W / 2 - 150, r2, '🏪 辅助商城', {
            fontSize: '20px', fontStyle: 'bold', color: '#FFFFFF'
        }).setOrigin(0.5);
        shopBtn.on('pointerover', function() { shopBtn.setScale(1.05); });
        shopBtn.on('pointerout',  function() { shopBtn.setScale(1.0); });
        shopBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(300);
            self.time.delayedCall(300, function() { self.scene.start('ShopScene'); });
        });

        var cardBtn = this.add.image(W / 2 + 150, r2, 'btn_med').setInteractive({ useHandCursor: true });
        this.add.text(W / 2 + 150, r2, '📚 关爱知识', {
            fontSize: '20px', fontStyle: 'bold', color: '#FFFFFF'
        }).setOrigin(0.5);
        cardBtn.on('pointerover', function() { cardBtn.setScale(1.05); });
        cardBtn.on('pointerout',  function() { cardBtn.setScale(1.0); });
        cardBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(300);
            self.time.delayedCall(300, function() { self.scene.start('KnowledgeScene'); });
        });

        // 第三行：AI变老 + 炎夏归途（并排）
        var r3 = btnY + rowH * 2;
        var agingBtn = this.add.image(W / 2 - 150, r3, 'btn_med').setInteractive({ useHandCursor: true });
        this.add.text(W / 2 - 150, r3, '🕰️ AI 变老', {
            fontSize: '20px', fontStyle: 'bold', color: '#FFFFFF'
        }).setOrigin(0.5);
        agingBtn.on('pointerover', function() { agingBtn.setScale(1.05); });
        agingBtn.on('pointerout',  function() { agingBtn.setScale(1.0); });
        agingBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(300);
            self.time.delayedCall(300, function() { self.scene.start('AIAgingScene'); });
        });

        var journeyBtn = this.add.image(W / 2 + 150, r3, 'btn_med').setInteractive({ useHandCursor: true });
        this.add.text(W / 2 + 150, r3, '🔥 炎夏归途', {
            fontSize: '20px', fontStyle: 'bold', color: '#FFFFFF'
        }).setOrigin(0.5);
        journeyBtn.on('pointerover', function() { journeyBtn.setScale(1.05); });
        journeyBtn.on('pointerout',  function() { journeyBtn.setScale(1.0); });
        journeyBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(300);
            self.time.delayedCall(300, function() { self.scene.start('HeatJourneyScene'); });
        });

        // 第四行：终章解锁后的额外入口（btn_small，间距适配 200px 宽）
        if (GS.finaleCompleted) {
            var r4 = btnY + rowH * 3;
            var storyBtn = this.add.image(W / 2 - 130, r4, 'btn_small').setInteractive({ useHandCursor: true });
            this.add.text(W / 2 - 130, r4, '📖 老人故事', {
                fontSize: '16px', fontStyle: 'bold', color: '#333333'
            }).setOrigin(0.5);
            storyBtn.on('pointerdown', function() {
                AudioFX.click();
                self.cameras.main.fadeOut(300);
                self.time.delayedCall(300, function() { self.scene.start('StoriesScene'); });
            });

            var ageKnowBtn = this.add.image(W / 2 + 130, r4, 'btn_small').setInteractive({ useHandCursor: true });
            this.add.text(W / 2 + 130, r4, '💡 适老化知识', {
                fontSize: '16px', fontStyle: 'bold', color: '#333333'
            }).setOrigin(0.5);
            ageKnowBtn.on('pointerdown', function() {
                AudioFX.click();
                self.cameras.main.fadeOut(300);
                self.time.delayedCall(300, function() { self.scene.start('AgingKnowledgeScene'); });
            });

            // 重置按钮
            var r5 = btnY + rowH * 4;
            var resetBtn = this.add.image(W / 2, r5, 'btn_small').setInteractive({ useHandCursor: true });
            this.add.text(W / 2, r5, '🔄 重新体验', {
                fontSize: '16px', fontStyle: 'bold', color: '#333333'
            }).setOrigin(0.5);
            resetBtn.on('pointerdown', function() {
                GS.reset();
                self.cameras.main.fadeOut(300);
                self.time.delayedCall(300, function() { self.scene.restart(); });
            });
        }

        // 重置按钮（未完成终章时，有进度）
        if (!GS.finaleCompleted && hasProgress) {
            var r4 = btnY + rowH * 3;
            var resetBtn = this.add.image(W / 2, r4, 'btn_small').setInteractive({ useHandCursor: true });
            this.add.text(W / 2, r4, '🔄 重新开始', {
                fontSize: '16px', fontStyle: 'bold', color: '#333333'
            }).setOrigin(0.5);
            resetBtn.on('pointerdown', function() {
                GS.reset();
                self.cameras.main.fadeOut(300);
                self.time.delayedCall(300, function() { self.scene.restart(); });
            });
        }

        this.cameras.main.fadeIn(600);
    }
}

// ==================== ChapterNarrativeScene ====================
// 章节过场 — 用于章首叙事引入 和 章末过渡
class ChapterNarrativeScene extends Phaser.Scene {
    constructor() { super({ key: 'ChapterNarrativeScene' }); }

    init(data) {
        this.narrativeData = data || {};
        // mode: 'intro' | 'outro' | 'finale_reveal'
        this.narrativeMode = data.mode || 'intro';
        this.chapterId = data.chapterId || 1;
        this.nextScene = data.nextScene || 'GameScene';
    }

    create() {
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        // 背景
        var bg = this.add.graphics();
        bg.fillGradientStyle(0x1a1a2e, 0x0a0a1a, 0x16213e, 0x0a0a1a);
        bg.fillRect(0, 0, W, H);

        // 装饰粒子
        for (var i = 0; i < 20; i++) {
            var px = Math.random() * W, py = Math.random() * H;
            var p = this.add.image(px, py, 'particle').setAlpha(Math.random() * 0.15).setScale(0.3 + Math.random() * 0.5).setTint(0xFFD93D);
            this.tweens.add({ targets: p, alpha: 0, duration: 1500 + Math.random() * 2000, delay: Math.random() * 1000, repeat: -1 });
        }

        var chapter = this.narrativeData.chapter;
        var lines = this.narrativeData.lines || [];

        if (this.narrativeMode === 'intro') {
            // 章首：显示章节名 + 叙事文字
            var chapLabel = this.add.text(W / 2, 60, chapter.name + ' · ' + chapter.subtitle, {
                fontSize: '20px', color: '#8888AA', fontStyle: 'bold'
            }).setOrigin(0.5).setAlpha(0);

            var title = this.add.text(W / 2, 140, chapter.introTitle, {
                fontSize: '36px', color: '#FFD93D', fontStyle: 'bold'
            }).setOrigin(0.5).setAlpha(0);

            this.tweens.add({ targets: chapLabel, alpha: 1, duration: 600, delay: 200 });
            this.tweens.add({ targets: title, alpha: 1, duration: 800, delay: 500 });

            // 逐行显示叙事文字
            var startY = 210;
            lines.forEach(function(line, i) {
                var t = self.add.text(W / 2, startY + i * 40, line, {
                    fontSize: '18px', color: '#AAABCC', fontStyle: 'italic'
                }).setOrigin(0.5).setAlpha(0);
                self.tweens.add({ targets: t, alpha: 1, duration: 500, delay: 1000 + i * 600 });
            });

            // 继续按钮
            var delay = 1000 + lines.length * 600 + 800;
            this.time.delayedCall(delay, function() {
                self.showContinueButton(chapter);
            });
        } else if (this.narrativeMode === 'outro') {
            // 章末叙事
            var endTitle = this.add.text(W / 2, 100, chapter.endTitle, {
                fontSize: '32px', color: '#4CAF50', fontStyle: 'bold'
            }).setOrigin(0.5).setAlpha(0);

            this.tweens.add({ targets: endTitle, alpha: 1, duration: 600 });

            var startY = 180;
            lines.forEach(function(line, i) {
                var t = self.add.text(W / 2, startY + i * 42, line, {
                    fontSize: '18px', color: '#CCBBCC', fontStyle: 'italic'
                }).setOrigin(0.5).setAlpha(0);
                self.tweens.add({ targets: t, alpha: 1, duration: 500, delay: 400 + i * 600 });
            });

            var delay = 400 + lines.length * 600 + 800;
            this.time.delayedCall(delay, function() {
                self.showContinueButton(chapter, true);
            });
        }

        this.cameras.main.fadeIn(800);
    }

    showContinueButton(chapter, isOutro) {
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        var btnY = H - 80;
        var btn = this.add.image(W / 2, btnY, 'btn_med').setInteractive({ useHandCursor: true }).setAlpha(0);
        var btnLabel = isOutro ? '▶ 进入下一章' : '▶ 开始挑战';
        var txt = this.add.text(W / 2, btnY, btnLabel, {
            fontSize: '20px', color: '#FFFFFF', fontStyle: 'bold'
        }).setOrigin(0.5).setAlpha(0);

        this.tweens.add({ targets: [btn, txt], alpha: 1, duration: 400, ease: 'Power2' });

        btn.on('pointerover', function() { btn.setScale(1.05); });
        btn.on('pointerout',  function() { btn.setScale(1.0); });
        btn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(500);
            self.time.delayedCall(500, function() {
                if (isOutro) {
                    // 章末后进入下一章叙述 或 终章
                    var nextChapId = chapter.id + 1;
                    if (nextChapId <= 5) {
                        var nextChap = CHAPTERS[nextChapId - 1];
                        self.scene.start('ChapterNarrativeScene', {
                            mode: 'intro',
                            chapter: nextChap,
                            chapterId: nextChapId,
                            nextScene: 'GameScene',
                            lines: nextChap.introLines
                        });
                    } else {
                        // 五章完 → 进入终章揭示
                        self.scene.start('FinalRevelationScene');
                    }
                } else {
                    self.scene.start('GameScene');
                }
            });
        });
    }
}

// ==================== FinalRevelationScene ====================
// 终章揭示 — 所有障碍叠加后的共鸣顶点 → 老人生命叙事
class FinalRevelationScene extends Phaser.Scene {
    constructor() { super({ key: 'FinalRevelationScene' }); }

    create() {
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        // 深色背景
        var bg = this.add.graphics();
        bg.fillGradientStyle(0x0a0a1a, 0x050510, 0x0a0a1a, 0x050510);
        bg.fillRect(0, 0, W, H);

        // 老人角色 — 从底部浮现
        var elder = this.add.image(W / 2, H + 100, 'elder').setScale(1.8).setAlpha(0);
        this.tweens.add({
            targets: elder, y: H - 120, alpha: 1,
            duration: 2000, delay: 500, ease: 'Sine.easeOut'
        });

        // ===== 阶段1：逐句揭示 — 每行独立垂直位置防止重叠 =====
        var lineStartY = 40;
        var lineStepY = 34;
        var revealEls = [];
        var revealLines = [
            { text: '这就是许多老人', delay: 2500, color: '#CCCCDD', idx: 0 },
            { text: '每一天的真实体验。', delay: 3300, color: '#FFFFFF', idx: 1 },
            { text: '他们不是"笨"，', delay: 5000, color: '#CCCCDD', idx: 2 },
            { text: '不是"慢"，', delay: 5700, color: '#CCCCDD', idx: 3 },
            { text: '不是"麻烦"。', delay: 6400, color: '#CCCCDD', idx: 4 },
            { text: '他们只是……', delay: 7800, color: '#FFD93D', idx: 5 },
            { text: '在和时间赛跑。', delay: 8600, color: '#FFD93D', idx: 6 },
        ];

        revealLines.forEach(function(line) {
            var yPos = lineStartY + line.idx * lineStepY;
            var t = self.add.text(W / 2, yPos, line.text, {
                fontSize: '26px', color: line.color, fontStyle: 'bold'
            }).setOrigin(0.5).setAlpha(0);
            revealEls.push(t);
            self.tweens.add({ targets: t, alpha: 1, duration: 600, delay: line.delay });
            self.tweens.add({ targets: t, alpha: 0.6, duration: 400, delay: line.delay + 1200 });
        });

        // "共鸣顶点"大字
        var climax = this.add.text(W / 2, lineStartY + 7 * lineStepY + 20, '', {
            fontSize: '22px', color: '#FFD93D', fontStyle: 'italic'
        }).setOrigin(0.5).setAlpha(0);
        revealEls.push(climax);

        this.time.delayedCall(9500, function() {
            climax.setText('— 你的挫败感，就是他们的每一天 —');
            self.tweens.add({ targets: climax, alpha: 1, duration: 1000 });
        });

        // ===== 阶段2：生命叙事 — 老人的内心世界 =====
        // 叙事文本：从老人第一人称视角，展现内心沉重与外在伪装的反差
        var narrativeLines = [
            { text: '', delay: 0 }, // 留白一行
            { text: '他今年七十三了。', delay: 1400 },
            { text: '每天早上醒来，第一件事不是睁眼，', delay: 2200 },
            { text: '而是用指尖摸索着膝盖——确认它还听话。', delay: 3000 },
            { text: '骨头像生锈的铰链，每次起立都发出只有自己听得见的闷响。', delay: 4000 },
            { text: '他瞒着所有人，包括女儿。', delay: 5000 },
            { text: '', delay: 0 },
            { text: '「吃药了？疼不疼啊爸？」手机那头是女儿的声音。', delay: 6800 },
            { text: '他连忙坐直，清了清嗓子，让声线往上提了半个音：', delay: 7800 },
            { text: '「吃了吃了！好着呢，你呀，别老挂着我，忙你的去。」', delay: 8800 },
            { text: '他没说的是：昨夜疼醒了三次。', delay: 10000 },
            { text: '他没说的是：药瓶上的字，已经模糊得像一群灰蚂蚁。', delay: 11000 },
            { text: '他更没说的是：刚才下床的时候，扶着墙缓了整整五分钟。', delay: 12000 },
            { text: '', delay: 0 },
            { text: '「嗯嗯，那你多注意身体啊爸，我这边有点忙，先挂了。」', delay: 14000 },
            { text: '忙音。', delay: 15200 },
            { text: '他把手机从耳边移开，看了看屏幕上女儿的头像——', delay: 16000 },
            { text: '那是三年前拍的，那天她难得回来吃了一顿饭。', delay: 17000 },
            { text: '他保存了这张照片，设成了来电头像。', delay: 17800 },
            { text: '', delay: 0 },
            { text: '窗外，路灯一盏一盏亮起来。', delay: 19400 },
            { text: '他把药片和水端端正正地摆在床头，', delay: 20200 },
            { text: '又起身去衣柜里拿出一件外套，叠好放在枕边。', delay: 21000 },
            { text: '不是因为冷。', delay: 22000 },
            { text: '是因为这个漫长的夜晚，', delay: 22600 },
            { text: '总得有什么在旁边，陪着他。', delay: 23400 },
        ];

        var narrativeEls = [];
        var narrStartY = 50;
        var narrLineH = 20;

        // 10200ms: 先淡出阶段1的文字
        this.time.delayedCall(10200, function() {
            revealEls.forEach(function(el) {
                self.tweens.add({ targets: el, alpha: 0, duration: 800 });
            });
        });

        // 11200ms: 显示叙事标题
        var narrTitle = this.add.text(W / 2, 30, '', {
            fontSize: '18px', color: '#FFD93D', fontStyle: 'italic'
        }).setOrigin(0.5).setAlpha(0);
        narrativeEls.push(narrTitle);

        this.time.delayedCall(11200, function() {
            narrTitle.setText('「这不是一个故事，这是很多人的每一天」');
            self.tweens.add({ targets: narrTitle, alpha: 1, duration: 800 });
        });

        // 逐行显示叙事
        narrativeLines.forEach(function(line, i) {
            if (line.text === '') return; // 跳过空行（纯延迟）

            var yPos = narrStartY + narrativeEls.length * narrLineH;
            // 区分对话与其他文本的样式
            var isDialog = line.text.indexOf('「') !== -1 || line.text.indexOf('"') !== -1
                        || line.text === '忙音。';
            var isQuiet = line.text.indexOf('他没说的是') !== -1;

            var fontColor = isDialog ? '#EEEEFF' : (isQuiet ? '#9999CC' : '#AAABCC');
            var fontStyle = isQuiet ? 'italic' : 'normal';
            var fontSize = '13px';

            var t = self.add.text(W / 2, yPos, line.text, {
                fontSize: fontSize, color: fontColor, fontStyle: fontStyle,
                wordWrap: { width: W - 80 }, align: 'center'
            }).setOrigin(0.5, 0).setAlpha(0);
            narrativeEls.push(t);

            self.time.delayedCall(11200 + line.delay, function() {
                self.tweens.add({ targets: t, alpha: 1, duration: 800, ease: 'Sine.easeIn' });
            });

            // 行末轻微淡出（叙事整体感）
            self.time.delayedCall(11200 + line.delay + 2000, function() {
                if (t.active) self.tweens.add({ targets: t, alpha: 0.5, duration: 600 });
            });
        });

        // ===== 阶段3：叙事收束 → 按钮 =====
        var lastNarrTime = 11200 + 23400 + 1200; // 最后一行结束时间
        var fadeOutStart = lastNarrTime + 800;
        var buttonsShowTime = fadeOutStart + 1000;

        // 淡出叙事文字
        this.time.delayedCall(fadeOutStart, function() {
            narrativeEls.forEach(function(el) {
                if (el.active) self.tweens.add({ targets: el, alpha: 0, duration: 800 });
            });
        });

        // 阶段3结尾：共鸣语句
        var finalLine = this.add.text(W / 2, H / 2 - 40, '', {
            fontSize: '20px', color: '#FFD93D', fontStyle: 'italic'
        }).setOrigin(0.5).setAlpha(0);

        this.time.delayedCall(buttonsShowTime - 1200, function() {
            finalLine.setText('— 他们用一生教会我们坚强，最后却一个人学会了沉默 —');
            self.tweens.add({ targets: finalLine, alpha: 1, duration: 1200 });
        });

        // 按钮
        var btnY = H - 130;
        this.time.delayedCall(buttonsShowTime, function() {
            // 淡出结尾句
            self.tweens.add({ targets: finalLine, alpha: 0.4, duration: 600 });

            // 解锁所有知识
            GS.finaleCompleted = true;
            CHAPTERS.forEach(function() {
                ELDER_STORIES.forEach(function(_, i) {
                    if (GS.storiesUnlocked.indexOf(i) === -1) GS.storiesUnlocked.push(i);
                });
                AGING_KNOWLEDGE.forEach(function(_, i) {
                    if (GS.agingKnowledgeUnlocked.indexOf(i) === -1) GS.agingKnowledgeUnlocked.push(i);
                });
            });

            // 按钮
            var btn1 = self.add.image(W / 2 - 150, btnY, 'btn_med').setInteractive({ useHandCursor: true }).setAlpha(0);
            var btn1Txt = self.add.text(W / 2 - 150, btnY, '📖 老人故事', {
                fontSize: '18px', color: '#FFFFFF', fontStyle: 'bold'
            }).setOrigin(0.5).setAlpha(0);

            var btn2 = self.add.image(W / 2 + 150, btnY, 'btn_med').setInteractive({ useHandCursor: true }).setAlpha(0);
            var btn2Txt = self.add.text(W / 2 + 150, btnY, '💡 适老化知识', {
                fontSize: '18px', color: '#FFFFFF', fontStyle: 'bold'
            }).setOrigin(0.5).setAlpha(0);

            self.tweens.add({ targets: [btn1, btn1Txt, btn2, btn2Txt], alpha: 1, duration: 500 });

            btn1.on('pointerdown', function() {
                AudioFX.click();
                self.cameras.main.fadeOut(400);
                self.time.delayedCall(400, function() { self.scene.start('StoriesScene'); });
            });
            btn2.on('pointerdown', function() {
                AudioFX.click();
                self.cameras.main.fadeOut(400);
                self.time.delayedCall(400, function() { self.scene.start('AgingKnowledgeScene'); });
            });

            // "回到首页"按钮
            var btnHome = self.add.image(W / 2, btnY + 55, 'btn_small').setInteractive({ useHandCursor: true }).setAlpha(0);
            var btnHomeTxt = self.add.text(W / 2, btnY + 55, '🏠 返回首页', {
                fontSize: '14px', color: '#333333', fontStyle: 'bold'
            }).setOrigin(0.5).setAlpha(0);
            self.tweens.add({ targets: [btnHome, btnHomeTxt], alpha: 1, duration: 500 });

            btnHome.on('pointerdown', function() {
                AudioFX.click();
                self.cameras.main.fadeOut(400);
                self.time.delayedCall(400, function() { self.scene.start('MenuScene'); });
            });
        });

        this.cameras.main.fadeIn(1000);
    }
}

// 老人故事列表
class StoriesScene extends Phaser.Scene {

        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        var bg = this.add.graphics();
        bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x0f3460, 0x0f3460);
        bg.fillRect(0, 0, W, H);

        this.add.text(W / 2, 28, '📖 真实的老年生活故事', {

        }).setOrigin(0.5);

        this.add.text(W / 2, 55, '从游戏中走出来，听听老人们自己的声音', {
            fontSize: '13px', color: '#8888AA'
        }).setOrigin(0.5);

        // 卡片列表（可滚动区域的简化版）
        var cardY = 75;
        var storyCount = ELDER_STORIES.length;

        ELDER_STORIES.forEach(function(story, i) {
            var yPos = cardY + i * 100;

            // 卡片背景
            var card = self.add.graphics();
            card.fillStyle(0x252540, 0.9);
            card.fillRoundedRect(20, yPos, W - 40, 90, 10);
            card.lineStyle(1, 0x4CAF50, 0.3);
            card.strokeRoundedRect(20, yPos, W - 40, 90, 10);

            // 标题
            self.add.text(40, yPos + 8, story.title, {
                fontSize: '17px', fontStyle: 'bold', color: '#FFFFFF'
            });

            // 内容摘要（取前60字）
            var summary = story.content.length > 55 ? story.content.substring(0, 55) + '…' : story.content;
            self.add.text(40, yPos + 32, summary, {
                fontSize: '12px', color: '#AAABCC', wordWrap: { width: W - 90 }
            });

            // 点击查看详情
            var hitArea = self.add.zone(40, yPos + 45, W - 80, 90).setOrigin(0, 0).setInteractive({ useHandCursor: true }).setDepth(5);
            hitArea.on('pointerdown', function() {
                AudioFX.click();
                self.showStoryDetail(story, i);
            });
            hitArea.on('pointerover', function() {
                card.clear();
                card.fillStyle(0x2A4A2A, 0.9);
                card.fillRoundedRect(20, yPos, W - 40, 90, 10);
                card.lineStyle(1, 0x4CAF50, 0.5);
                card.strokeRoundedRect(20, yPos, W - 40, 90, 10);
            });
            hitArea.on('pointerout', function() {
                card.clear();
                card.fillStyle(0x252540, 0.9);
                card.fillRoundedRect(20, yPos, W - 40, 90, 10);
                card.lineStyle(1, 0x4CAF50, 0.3);
                card.strokeRoundedRect(20, yPos, W - 40, 90, 10);
            });
        });

        // 返回按钮（层级高于卡片以确保可点击）
        var backBtn = this.add.image(W / 2, H - 25, 'btn_small').setInteractive({ useHandCursor: true }).setDepth(20);

        backBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(300);
            self.time.delayedCall(300, function() { self.scene.start('FinalRevelationScene'); });
        });

        this.cameras.main.fadeIn(400);
    }

    showStoryDetail(story, idx) {
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        // 遮罩
        var mask = this.add.graphics().setDepth(200);
        mask.fillStyle(0x000000, 0.8);
        mask.fillRect(0, 0, W, H);
        mask.setInteractive();

        var panel = this.add.image(W / 2, H / 2, 'card_bg').setDepth(201).setScale(0);
        this.tweens.add({ targets: panel, scale: 1, duration: 300, ease: 'Back.easeOut' });

        this.add.text(W / 2, H / 2 - 120, '第 ' + (idx + 1) + ' 个故事', {
            fontSize: '14px', color: '#8888AA'
        }).setOrigin(0.5).setDepth(202);

        this.add.text(W / 2, H / 2 - 90, story.title, {
            fontSize: '26px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5).setDepth(202);

        // 分隔线
        var line = this.add.graphics().setDepth(202);
        line.lineStyle(1, 0xFFD93D, 0.3);
        line.lineBetween(W / 2 - 180, H / 2 - 55, W / 2 + 180, H / 2 - 55);

        this.add.text(W / 2, H / 2 - 25, story.content, {
            fontSize: '14px', color: '#CCCCDD',
            wordWrap: { width: 400 }, align: 'center', lineSpacing: 5
        }).setOrigin(0.5).setDepth(202);

        // 适老化建议
        this.add.text(W / 2, H / 2 + 75, '💡 ' + story.tip, {
            fontSize: '13px', color: '#4CAF50',
            wordWrap: { width: 400 }, align: 'center', lineSpacing: 3
        }).setOrigin(0.5).setDepth(202);

        var closeBtn = this.add.text(W / 2, H / 2 + 130, '✕ 关闭', {
            fontSize: '18px', color: '#8888AA', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(202).setInteractive({ useHandCursor: true });

        closeBtn.on('pointerdown', function() {
            AudioFX.click();
            var list = self.children.list.slice();
            list.forEach(function(child) {
                if (child.depth >= 200 && child.depth < 300 && child.active) child.destroy();
            });
        });
    }
}

    showKnowledgeDetail(knowledge, idx) {

}

// ==================== GameScene ====================
class GameScene extends Phaser.Scene {
    constructor() { super({ key: 'GameScene' }); }

    create() {
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        // 背景
        var bg = this.add.graphics();
        bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x0f3460, 0x0f3460);
        bg.fillRect(0, 0, W, H);

        // ---- 获取当前章节衰老参数 ----
        var chapter = CHAPTERS[GS.chapter - 1];
        this.aging = {
            visual: chapter.aging.visual,
            hearing: chapter.aging.hearing,
            memory: chapter.aging.memory,
            motor: chapter.aging.motor || 0
        };
        this.chapterRounds = chapter.rounds;
        this.currentChapterRound = GS.chapterRound;
        this.subLevelIdx = GS.chapterRound; // 当前子关卡索引

        // 应用视觉老化遮罩
        VisualAging.createOverlay(this, this.aging.visual, GS.devices.magnifier);

        // 应用听力衰退滤波器
        AudioFX.setAgingLevel(this.aging.hearing, GS.devices.hearing);
        // 语音人声模糊（听力衰退章节启用）
        VoiceFX.setMuffled(this.aging.hearing > 0);

        // ---- 状态变量 ----
        this.isPlaying = false;
        this.isRoundOver = false;
        this.isPaused = false;
        this.roundTargets = [];
        this.currentTargetIdx = 0;
        this.roundCoins = 0;
        this.roundHits = 0;
        this.roundMisses = 0;
        this.allowance = GS.devices.cane ? 1 : 0;
        this.currentBlock = null;
        this.blockTimer = null;

        // ---- 手抖指针跟踪 ----
        this._tremorPointerRealX = 0;
        this._tremorPointerRealY = 0;
        this.input.on('pointermove', function(p) {
            self._tremorPointerRealX = p.x;
            self._tremorPointerRealY = p.y;
        });

        // 场景关闭时清理手抖
        this.events.on('shutdown', function() {
            HandTremor.disable();
        });

        // ---- 顶部 HUD ----
        var hudBar = this.add.graphics().setDepth(185);
        hudBar.fillStyle(0x000000, 0.5);
        hudBar.fillRect(0, 0, W, 56);

        this.levelText = this.add.text(16, 10, '第 ' + GS.level + ' 关', {
            fontSize: '20px', fontStyle: 'bold', color: '#FFD93D'
        }).setDepth(186);

        // 章节信息
        this.chapterText = this.add.text(W / 2, 10, chapter.name + ' · ' + chapter.subtitle, {
            fontSize: '16px', fontStyle: 'bold', color: '#CCCCDD'
        }).setOrigin(0.5, 0).setDepth(186);

        // 衰老状态指示器
        var agingIcons = [];
        if (this.aging.visual > 0) agingIcons.push('👁️模糊');
        if (this.aging.hearing > 0) agingIcons.push('👂衰退');
        if (this.aging.memory > 0) agingIcons.push('🧠健忘');
        if (this.aging.motor > 0) agingIcons.push('🤝手抖');
        this.agingStatusText = this.add.text(W / 2, 34, agingIcons.join(' + '), {
            fontSize: '13px', color: '#FF6B6B'
        }).setOrigin(0.5, 0).setDepth(186);

        // 时间币
        this.add.image(W - 130, 28, 'coin').setScale(1).setDepth(186);
        this.coinText = this.add.text(W - 110, 17, '' + GS.coins, {
            fontSize: '24px', fontStyle: 'bold', color: '#FFD93D'
        }).setDepth(186);

        // 进度指示
        this.progressText = this.add.text(W - 210, 17, GS.chapterRound + '/' + this.chapterRounds, {
            fontSize: '16px', color: '#8888AA'
        }).setOrigin(1, 0).setDepth(186);

        // ---- 暂停按钮（右上角，在老化遮罩之上）----
        this.pauseBtn = this.add.image(W - 26, 70, 'btn_pause')
            .setInteractive({ useHandCursor: true }).setDepth(195).setScale(0.85);
        this.pauseBtn.on('pointerdown', function() {
            AudioFX.click();
            self.togglePause();
        });

        // ---- 提示按钮（在老化遮罩之上）----
        this.hintBtn = this.add.image(W - 68, 70, 'btn_hint')
            .setInteractive({ useHandCursor: true }).setDepth(195).setScale(0.85);
        this.hintBtn.on('pointerdown', function() {
            AudioFX.click();
            self.showHint();
        });
        this.hintPopup = null; // 当前显示的提示弹窗

        // 底部统计
        this.roundStatText = this.add.text(W / 2, H - 16, '', {
            fontSize: '13px', color: '#8888AA'
        }).setOrigin(0.5).setDepth(186);

        // 开始挑战
        this.time.delayedCall(300, function() {
            self.startRound();
        });

        this.cameras.main.fadeIn(500);
    }

    // ---------- 暂停/继续 ----------
    togglePause() {
        var self = this;
        if (this.isRoundOver) return;
        this.isPaused = !this.isPaused;

        if (this.isPaused) {
            // 暂停
            if (this.blockTimer) { this.blockTimer.paused = true; }
            this.pauseBtn.setTexture('btn_play');
            VoiceFX.stop(); // 停止人声朗读
            // 显示暂停遮罩
            var W = this.cameras.main.width, H = this.cameras.main.height;
            this.pauseOverlay = this.add.graphics().setDepth(189);
            this.pauseOverlay.fillStyle(0x000000, 0.6);
            this.pauseOverlay.fillRect(0, 0, W, H);
            this.pauseText = this.add.text(W / 2, H / 2, '⏸ 已暂停', {
                fontSize: '36px', fontStyle: 'bold', color: '#FFD93D'
            }).setOrigin(0.5).setDepth(190);
            this.pauseSubText = this.add.text(W / 2, H / 2 + 45, '点击 ▶ 按钮继续游戏', {
                fontSize: '16px', color: '#AAABCC'
            }).setOrigin(0.5).setDepth(190);
            // 暂停所有动画
            this.tweens.pauseAll();
            this.time.paused = true;
        } else {
            // 继续
            if (this.blockTimer) { this.blockTimer.paused = false; }
            this.pauseBtn.setTexture('btn_pause');
            if (this.pauseOverlay) { this.pauseOverlay.destroy(); this.pauseOverlay = null; }
            if (this.pauseText) { this.pauseText.destroy(); this.pauseText = null; }
            if (this.pauseSubText) { this.pauseSubText.destroy(); this.pauseSubText = null; }
            this.tweens.resumeAll();
            this.time.paused = false;
        }
    }

    // ---------- 显示提示 ----------
    showHint() {
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        // 如果已有提示，先关闭
        if (this.hintPopup) {
            this.hideHint();
            return;
        }

        // 随机选一条提示
        var hintText = HINT_TEXTS[Phaser.Math.Between(0, HINT_TEXTS.length - 1)];

        // 遮罩
        this.hintMask = this.add.graphics().setDepth(300);
        this.hintMask.fillStyle(0x000000, 0.7);
        this.hintMask.fillRect(0, 0, W, H);
        this.hintMask.setInteractive();

        // 提示面板
        var panel = this.add.graphics().setDepth(301);
        panel.fillStyle(0x1E1E32, 0.96);
        panel.fillRoundedRect(W / 2 - 240, H / 2 - 70, 480, 140, 16);
        panel.lineStyle(2, 0xFFD93D, 0.5);
        panel.strokeRoundedRect(W / 2 - 240, H / 2 - 70, 480, 140, 16);

        var tipLabel = this.add.text(W / 2, H / 2 - 50, '💡 关爱提示', {
            fontSize: '20px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5).setDepth(302);

        var tipContent = this.add.text(W / 2, H / 2 - 10, hintText, {
            fontSize: '15px', color: '#CCCCDD',
            wordWrap: { width: 420 }, align: 'center', lineSpacing: 5
        }).setOrigin(0.5).setDepth(302);

        var closeBtn = this.add.text(W / 2, H / 2 + 50, '✕ 关闭', {
            fontSize: '16px', color: '#FFD93D', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(302).setInteractive({ useHandCursor: true });

        closeBtn.on('pointerover', function() { closeBtn.setColor('#FFFFFF'); });
        closeBtn.on('pointerout',  function() { closeBtn.setColor('#FFD93D'); });
        closeBtn.on('pointerdown', function() {
            AudioFX.click();
            self.hideHint();
        });

        this.hintPopup = { mask: this.hintMask, panel: panel, label: tipLabel, content: tipContent, btn: closeBtn };
    }

    hideHint() {
        if (this.hintPopup) {
            for (var k in this.hintPopup) {
                if (this.hintPopup[k] && this.hintPopup[k].active) this.hintPopup[k].destroy();
            }
            this.hintPopup = null;
        }
    }

    // ---------- 获取方块基础停留时间 ----------
    getBlockDuration() {
        var chapter = CHAPTERS[GS.chapter - 1];
        var subLevel = chapter.subLevels[this.subLevelIdx] || { type: 'normal' };
        var base = 2500;
        // 记忆衰退：显示时间缩短
        if (this.aging.memory > 0) base -= 400;
        // 子关卡影响
        if (subLevel.type === 'memoryFade' || subLevel.type === 'chaos') base -= 500;
        if (subLevel.type === 'shuffle') base -= 200;
        // 关卡递增缩短
        base -= Math.floor(GS.level / 3) * 80;
        return Math.max(800, base);
    }

    // ---------- 开始本轮 ----------
    startRound() {
        var self = this;
        this.isRoundOver = false;
        this.isPlaying = false;
        this._convOptionsShown = false;
        this.roundCoins = 0;
        this.roundHits = 0;
        this.roundMisses = 0;
        this.allowance = GS.devices.cane ? 1 : 0;

        var W = this.cameras.main.width, H = this.cameras.main.height;
        var chapter = CHAPTERS[GS.chapter - 1];
        var subLevel = chapter.subLevels[this.subLevelIdx] || { gameType: 'clickBlock', type: 'normal', name: '挑战', desc: '' };

        this.roundStatText.setText('关卡: ' + subLevel.name + '  |  容错: ' + this.allowance);

        // 显示子关卡名称
        var subName = this.add.text(W / 2, H / 2 - 70, '「' + subLevel.name + '」', {
            fontSize: '24px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5).setDepth(187);

        var subDesc = this.add.text(W / 2, H / 2 - 30, subLevel.desc, {
            fontSize: '14px', color: '#AAABCC'
        }).setOrigin(0.5).setDepth(187);

        var prompt = this.add.text(W / 2, H / 2 + 10, '准备…', {
            fontSize: '24px', fontStyle: 'bold', color: '#4CAF50'
        }).setOrigin(0.5).setDepth(187);

        this.time.delayedCall(1200, function() {
            self.tweens.add({
                targets: [prompt, subName, subDesc], alpha: 0, duration: 300,
                onComplete: function() {
                    prompt.destroy(); subName.destroy(); subDesc.destroy();
                }
            });
            self.isPlaying = true;
            // 启用手抖效果
            HandTremor.enableForScene(self, self.aging.motor);

            // 根据 gameType 分发不同玩法
            var gt = subLevel.gameType || 'clickBlock';
            if (gt === 'readText') {
                self.startReadTextChallenge();
            } else if (gt === 'hearTone') {
                self.startHearToneChallenge();
            } else if (gt === 'memoryGrid') {
                self.startMemoryGridChallenge();
            } else if (gt === 'rememberItem') {
                self.startRememberItemChallenge();
            } else if (gt === 'cognitiveDistortion') {
                self.startCognitiveDistortionChallenge();
            } else {
                // clickBlock：原有流程
                var count = Math.min(5 + Math.floor(GS.level / 2), 10);
                self.roundTargets = [];
                for (var i = 0; i < count; i++) {
                    self.roundTargets.push({
                        x: Phaser.Math.Between(80, W - 80),
                        y: Phaser.Math.Between(110, H - 80),
                        colorIdx: Phaser.Math.Between(0, 3)
                    });
                }
                self.currentTargetIdx = 0;
                self.roundStatText.setText('目标: ' + count + '  |  每方块 ' + (self.getBlockDuration() / 1000).toFixed(1) + 's  |  容错: ' + self.allowance);
                self.spawnNextTarget();
            }
        });
    }

    // ---------- 生成下一个目标 ----------
    spawnNextTarget() {
        if (this.isRoundOver) return;
        if (this.currentTargetIdx >= this.roundTargets.length) {
            this.endRound();
            return;
        }

        var target = this.roundTargets[this.currentTargetIdx];
        var duration = this.getBlockDuration();
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        var texKey = 'block_' + target.colorIdx;

        // 显示位置（无抖动偏移，视觉老化通过遮罩层实现）
        var showX = target.x;
        var showY = target.y;

        // 视觉老化：方块缩小 + 半透明
        var blockScale = 1.0;
        var blockAlpha = 1.0;
        if (this.aging.visual >= 2) {
            blockScale = 0.78;
            blockAlpha = 0.8;
        } else if (this.aging.visual >= 1) {
            blockScale = 0.85;
            blockAlpha = 0.85;
        }
        if (GS.devices.magnifier) {
            blockScale = Math.min(1.0, blockScale + 0.2);
            blockAlpha = Math.min(1.0, blockAlpha + 0.2);
        }

        // ---- 子关卡特殊效果（先获取 subLevel）----
        var chapter = CHAPTERS[GS.chapter - 1];
        var subLevel = chapter.subLevels[this.subLevelIdx] || { type: 'normal' };

        // 音频方向提示（受听力衰退影响，silent类型静默，第二章去除提示音）
        if (this.aging.hearing > 0 && GS.chapter !== 2 && subLevel.type !== 'silent') {
            var panHint = (showX / W) * 2 - 1; // -1(左) 到 1(右)
            var freqHint = 300 + (showY / H) * 600; // 位置映射到频率
            AudioFX._tone(freqHint, 0.25, 'sine', 0.2, true);
        }

        // shrink 类型：方块更小
        if (subLevel.type === 'shrink' || subLevel.type === 'chaos') {
            blockScale = Math.max(0.45, blockScale - 0.35);
            blockAlpha = Math.max(0.4, blockAlpha - 0.3);
        }
        // misty 类型：额外的白雾覆盖
        var mistEffect = (subLevel.type === 'misty');

        // 创建方块
        var block = this.add.image(showX, showY, texKey)
            .setDepth(50).setAlpha(blockAlpha).setScale(0);

        // misty 效果：方块上半透明白雾层
        var blockMist = null;
        if (mistEffect) {
            blockMist = this.add.graphics().setDepth(51).setAlpha(0.5);
            blockMist.fillStyle(0xFFFFFF, 0.6);
            blockMist.fillRoundedRect(showX - 32, showY - 32, 64, 64, 14);
        }

        // 入场动画
        this.tweens.add({ targets: block, scale: blockScale, duration: 250, ease: 'Back.easeOut' });

        // flicker 类型：方块脉冲闪烁
        if (subLevel.type === 'flicker') {
            this.time.delayedCall(300, function() {
                if (!block.active || self.isRoundOver) return;
                self.tweens.add({
                    targets: block, alpha: 0.25, duration: 350,
                    yoyo: true, repeat: -1
                });
            });
        }

        // memoryFade / chaos 类型：快速显示后隐形，只留残影闪烁
        if (subLevel.type === 'memoryFade' || subLevel.type === 'chaos') {
            var visTime = GS.devices.memory ? 1000 : 500;
            this.time.delayedCall(visTime, function() {
                if (!block.active || self.isRoundOver) return;
                self.tweens.add({
                    targets: block, alpha: 0.15, duration: 300,
                    onComplete: function() {
                        if (!block.active || self.isRoundOver) return;
                        self.tweens.add({
                            targets: block, alpha: 0.25, duration: 500,
                            yoyo: true, repeat: -1
                        });
                    }
                });
            });
        }

        // shuffle 类型：短时间后跳到邻近位置
        if (subLevel.type === 'shuffle') {
            this.time.delayedCall(400, function() {
                if (!block.active || self.isRoundOver) return;
                var offsetX = Phaser.Math.Between(-60, 60);
                var offsetY = Phaser.Math.Between(-60, 60);
                self.tweens.add({
                    targets: block, x: showX + offsetX, y: showY + offsetY,
                    duration: 200, ease: 'Power2'
                });
                // 同步更新点击区域
                self.tweens.add({
                    targets: hitZone, x: showX + offsetX, y: showY + offsetY,
                    duration: 200, ease: 'Power2'
                });
                // 更新 mist 效果位置
                if (blockMist && blockMist.active) {
                    blockMist.clear();
                    blockMist.fillStyle(0xFFFFFF, 0.6);
                    blockMist.fillRoundedRect(showX + offsetX - 32, showY + offsetY - 32, 64, 64, 14);
                }
            });
        }

        // 普通记忆衰退（非特殊子关卡）
        if (this.aging.memory > 0 && subLevel.type === 'normal') {
            var visibleDuration = GS.devices.memory ? 1200 : 700;
            this.time.delayedCall(visibleDuration, function() {
                if (!block.active || self.isRoundOver) return;
                self.tweens.add({
                    targets: block, alpha: 0.25, duration: 400,
                    onComplete: function() {
                        if (!block.active || self.isRoundOver) return;
                        self.tweens.add({
                            targets: block, alpha: 0.35, duration: 500,
                            yoyo: true, repeat: -1
                        });
                    }
                });
            });
        }

        // 点击区域
        var hitZoneSize = 76;
        if (this.aging.visual >= 2) hitZoneSize = 52;
        if (GS.devices.mat) hitZoneSize = Math.min(76, hitZoneSize + 16);

        var hitZone = this.add.zone(showX, showY, hitZoneSize, hitZoneSize)
            .setInteractive({ useHandCursor: true })
            .setDepth(49);

        // 保存引用
        this.currentBlock = { block: block, hitZone: hitZone, target: target, clicked: false, mist: blockMist };

        (function(scene, zone, blk, tidx) {
            zone.on('pointerdown', function() {
                if (scene.isRoundOver) return;
                var cb = scene.currentBlock;
                if (!cb || cb.clicked) return;
                cb.clicked = true;
                scene.onTargetHit(blk, zone, tidx);
            });
        })(this, hitZone, block, this.currentTargetIdx);

        // 超时
        this.blockTimer = this.time.delayedCall(duration, function() {
            var cb = self.currentBlock;
            if (cb && !cb.clicked && !self.isRoundOver) {
                cb.clicked = true;
                self.onTargetMiss(cb.block, cb.hitZone);
            }
        });

        this.currentTargetIdx++;
    }

    // ---------- 目标被点击 ----------
    onTargetHit(block, zone, tidx) {
        if (this.isRoundOver) return;

        if (this.blockTimer) { this.blockTimer.remove(); this.blockTimer = null; }

        this.roundHits++;
        this.roundCoins++;
        GS.coins++;
        GS.totalHits++;
        this.coinText.setText('' + GS.coins);

        AudioFX.coin();

        this.spawnParticles(block.x, block.y, 0xFFD93D);

        var self = this;
        this.tweens.add({
            targets: block, scale: 1.4, alpha: 0, duration: 200,
            onComplete: function() {
                block.destroy();
                zone.destroy();
                if (self.currentBlock && self.currentBlock.mist && self.currentBlock.mist.active) {
                    self.currentBlock.mist.destroy();
                }
                if (!self.isRoundOver) self.spawnNextTarget();
            }
        });

        var plusText = this.add.text(block.x, block.y - 30, '+1 ⏱', {
            fontSize: '22px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5).setDepth(60);
        this.tweens.add({
            targets: plusText, y: plusText.y - 40, alpha: 0, duration: 600,
            onComplete: function() { plusText.destroy(); }
        });

        this.updateRoundStat();
    }

    // ---------- 目标未点击 ----------
    onTargetMiss(block, zone) {
        if (this.isRoundOver) return;

        if (this.allowance > 0) {
            this.allowance--;
            this.roundHits++;
            AudioFX.click();
            this.showFloatText(block.x, block.y - 30, '🛡️ 容错', '#4CAF50');
        } else {
            this.roundMisses++;
            GS.totalMisses++;
            AudioFX.miss();
            this.showFloatText(block.x, block.y - 30, 'MISS', '#CC0000');
        }

        var self = this;
        this.tweens.add({
            targets: block, scale: 0.3, alpha: 0, duration: 300,
            onComplete: function() {
                block.destroy();

    showFloatText(x, y, txt, color) {

        }).setOrigin(0.5).setDepth(60);

                x: x + Math.cos(angle) * dist,
                y: y + Math.sin(angle) * dist,
                alpha: 0, scale: 0.1,
                duration: 400,
                onComplete: function() { p.destroy(); }
            });
        }
    }

    // ---------- 阅读挑战：模糊文字辨识 ----------
    startReadTextChallenge() {
        var self = this;
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var chapter = CHAPTERS[GS.chapter - 1];
        var subLevel = chapter.subLevels[this.subLevelIdx] || {};

        // 随机选一个文本
        var textData = READ_TEXTS[Phaser.Math.Between(0, READ_TEXTS.length - 1)];

        // 模糊程度
        var blurLevel = this.aging.visual >= 2 ? 6 : 3;
        if (GS.devices.magnifier) blurLevel = Math.max(1, blurLevel - 2);

        // 模糊文字（用噪点叠加模拟）
        var textY = H / 2 - 80;
        var displayText = this.add.text(W / 2, textY, textData.display, {
            fontSize: '28px', fontStyle: 'bold', color: '#FFFFFF',
            wordWrap: { width: W - 80 }, align: 'center'
        }).setOrigin(0.5).setDepth(55);

        // 模拟模糊效果：多层半透明偏移文本
        for (var b = 0; b < blurLevel; b++) {
            var ox = (Math.random() - 0.5) * blurLevel * 2;
            var oy = (Math.random() - 0.5) * blurLevel * 2;
            var blurLayer = this.add.text(W / 2 + ox, textY + oy, textData.display, {
                fontSize: '28px', fontStyle: 'bold', color: '#FFFFFF',
                wordWrap: { width: W - 80 }, align: 'center'
            }).setOrigin(0.5).setDepth(54).setAlpha(0.08 + b * 0.02);
        }


        // 模拟白内障/飞蚊症：圆形墨斑遮挡文字
        var inkBlots = this.add.graphics().setDepth(56);
        var blotCount = this.aging.visual >= 2 ? 5 : 3; // 墨斑数量
        if (GS.devices.magnifier) blotCount = Math.max(1, blotCount - 2);
        var textRectLeft = W / 2 - 220;
        var textRectRight = W / 2 + 220;
        var textRectTop = textY - 28;
        var textRectBottom = textY + 28;
        var usedPositions = [];
        for (var ib = 0; ib < blotCount; ib++) {
            // 随机位置（在文本区域内）
            var bx = Phaser.Math.Between(textRectLeft + 30, textRectRight - 30);
            var by = Phaser.Math.Between(textRectTop + 10, textRectBottom - 10);
            var maxR = 18 + Math.random() * 28; // 半径 18-46
            // 主墨斑：深色圆
            inkBlots.fillStyle(0x222233, 0.72 + Math.random() * 0.18);
            inkBlots.fillCircle(bx, by, maxR);
            // 边缘晕染：更大更浅的半透明圆
            inkBlots.fillStyle(0x333344, 0.35 + Math.random() * 0.2);
            inkBlots.fillCircle(bx + (Math.random() - 0.5) * 8, by + (Math.random() - 0.5) * 8, maxR + 8);
            // 小卫星墨点
            for (var s = 0; s < 2; s++) {
                var sx = bx + (Math.random() - 0.5) * maxR * 1.8;
                var sy = by + (Math.random() - 0.5) * maxR * 1.8;
                if (sx > textRectLeft && sx < textRectRight && sy > textRectTop && sy < textRectBottom) {
                    inkBlots.fillStyle(0x2A2A3A, 0.45 + Math.random() * 0.25);
                    inkBlots.fillCircle(sx, sy, 4 + Math.random() * 10);
                }
            }
        }

        this.add.text(W / 2, textY + 50, textData.question, {
            fontSize: '14px', color: '#AAAAAA'
        }).setOrigin(0.5).setDepth(57);

        // 选项按钮
        var btnStartY = textY + 90;
        var choiceElements = [];
        var answered = false;

        textData.options.forEach(function(opt, i) {
            var btnY = btnStartY + i * 50;
            var btnBg = self.add.graphics().setDepth(57);
            btnBg.fillStyle(0x2A2A40);
            btnBg.fillRoundedRect(W / 2 - 220, btnY, 440, 42, 10);

            hitArea.on('pointerdown', function() {
                if (answered || self.isRoundOver) return;
                answered = true;

                var isCorrect = (i === textData.correct);

                    btnBg.lineStyle(2, 0x4CAF50);
                    btnBg.strokeRoundedRect(W / 2 - 220, btnY, 440, 42, 10);
                    optText.setColor('#4CAF50');
                    self.roundHits++;

                self._showDailyConvOptions(W, H, conv, tipText, statusText);
