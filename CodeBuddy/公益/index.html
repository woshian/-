    // ---------- 记忆挑战：记住位置 ----------
    startMemoryGridChallenge() {
        var self = this;
        var W = this.cameras.main.width, H = this.cameras.main.height;

        this.roundStatText.setText('记忆挑战：记住这些方块的位置！');

        // 生成 3-5 个彩色方块在随机位置
        var memCount = 3 + Math.floor(GS.level / 3);
        if (memCount > 6) memCount = 6;
        var memItems = [];
        var colors = [0xFF6B6B, 0x4ECDC4, 0xFFD93D, 0x6C5CE7];
        for (var i = 0; i < memCount; i++) {
            memItems.push({
                x: Phaser.Math.Between(100, W - 100),
                y: Phaser.Math.Between(130, H - 100),
                color: colors[Phaser.Math.Between(0, 3)],
                found: false
            });
        }

        // 显示阶段
        var memBlocks = [];
        var showDuration = GS.devices.memory ? 1500 : 800;
        memItems.forEach(function(item) {
            var g = self.add.graphics().setDepth(55);
            g.fillStyle(item.color, 0.9);
            g.fillRoundedRect(item.x - 20, item.y - 20, 40, 40, 8);
            g.setAlpha(0);
            self.tweens.add({ targets: g, alpha: 1, duration: 300 });
            memBlocks.push(g);
        });

        var countdownText = self.add.text(W / 2, 70, '记住这 ' + memCount + ' 个方块的位置！' + (showDuration / 1000).toFixed(0) + '秒后消失', {
            fontSize: '16px', color: '#FFD93D'
        }).setOrigin(0.5).setDepth(56);

        // 消失阶段
        self.time.delayedCall(showDuration, function() {
            countdownText.setText('现在找出它们的位置！');
            memBlocks.forEach(function(g) { self.tweens.add({ targets: g, alpha: 0, duration: 400, onComplete: function() { g.destroy(); } }); });

            // 让玩家点击
            var foundCount = 0;
            self.input.on('pointerdown', function handler(pointer) {
                if (self.isRoundOver) { self.input.off('pointerdown', handler); return; }
                for (var j = 0; j < memItems.length; j++) {
                    if (!memItems[j].found) {
                        var dist = Phaser.Math.Distance.Between(pointer.x, pointer.y, memItems[j].x, memItems[j].y);
                        if (dist < 45) {
                            memItems[j].found = true;
                            foundCount++;
                            AudioFX.coin();
                            // 显示找到的方块
                            var fg = self.add.graphics().setDepth(56);
                            fg.fillStyle(memItems[j].color, 0.9);
                            fg.fillRoundedRect(memItems[j].x - 20, memItems[j].y - 20, 40, 40, 8);
                            fg.lineStyle(2, 0x4CAF50);
                            fg.strokeRoundedRect(memItems[j].x - 20, memItems[j].y - 20, 40, 40, 8);
                            self.tweens.add({ targets: fg, alpha: 0.6, duration: 300, yoyo: true, repeat: 1 });

                            self.roundHits++;
                            self.roundCoins++;
                            GS.coins++;
                            GS.totalHits++;
                            self.coinText.setText('' + GS.coins);
                            self.showFloatText(memItems[j].x, memItems[j].y - 30, '+1 ⏱', '#4CAF50');
                            self.updateRoundStat();
                            countdownText.setText('已找到 ' + foundCount + ' / ' + memCount);

                            if (foundCount >= memCount) {
                                self.input.off('pointerdown', handler);
                                self.time.delayedCall(800, function() {
                                    if (!self.isRoundOver) self.endRound();
                                });
                            }
                            break;
                        }
                    }
                }
                // 点击了空白区域
                if (foundCount < memCount) {
                    var hitAny = false;
                    for (var k = 0; k < memItems.length; k++) {
                        if (!memItems[k].found && Phaser.Math.Distance.Between(pointer.x, pointer.y, memItems[k].x, memItems[k].y) < 45) {
                            hitAny = true; break;
                        }
                    }
                    if (!hitAny) {
                        self.roundMisses++;
                        GS.totalMisses++;
                        AudioFX.miss();
                        // 允许一定容错
                        if (self.roundMisses > 3) {
                            self.input.off('pointerdown', handler);
                            // 显示所有未找到的位置
                            for (var m = 0; m < memItems.length; m++) {
                                if (!memItems[m].found) {
                                    var ug = self.add.graphics().setDepth(56);
                                    ug.fillStyle(memItems[m].color, 0.5);
                                    ug.fillRoundedRect(memItems[m].x - 20, memItems[m].y - 20, 40, 40, 8);
                                    ug.lineStyle(2, 0xCC4444);
                                    ug.strokeRoundedRect(memItems[m].x - 20, memItems[m].y - 20, 40, 40, 8);
                                }
                            }
                            countdownText.setText('记忆位置揭晓…已找到 ' + foundCount + ' / ' + memCount);
                            self.time.delayedCall(2000, function() {
                                // 找到一半以上就算过关
                                if (foundCount >= Math.ceil(memCount / 2)) {
                                    self.roundHits = Math.max(self.roundHits, foundCount);
                                }
                                if (!self.isRoundOver) self.endRound();
                            });
                        }
                    }
                }
            });

            // 10秒超时
            self.time.delayedCall(10000, function() {
                if (self.isRoundOver) return;
                // 显示所有未找到的
                for (var m = 0; m < memItems.length; m++) {
                    if (!memItems[m].found) {
                        var ug = self.add.graphics().setDepth(56);
                        ug.fillStyle(memItems[m].color, 0.5);
                        ug.fillRoundedRect(memItems[m].x - 20, memItems[m].y - 20, 40, 40, 8);
                        ug.lineStyle(2, 0xCC4444);
                        ug.strokeRoundedRect(memItems[m].x - 20, memItems[m].y - 20, 40, 40, 8);
                    }
                }
                countdownText.setText('时间到！已找到 ' + foundCount + ' / ' + memCount);
                self.time.delayedCall(2000, function() {
                    if (foundCount >= Math.ceil(memCount / 2)) {
                        self.roundHits = Math.max(self.roundHits, foundCount);
                    }
                    if (!self.isRoundOver) self.endRound();
                });
            });
        });
    }

    // ---------- 物品记忆挑战：展示物品 → 选项中回忆 ----------
    startRememberItemChallenge() {
        var self = this;
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var chapter = CHAPTERS[GS.chapter - 1];
        var subLevel = chapter.subLevels[this.subLevelIdx] || { type: 'basic' };

        this.roundStatText.setText('记忆挑战：记住这些物品！');

        // 根据难度选物品数
        var itemCount = 4;
        var optionCount = 8; // 总选项（含干扰项）
        if (subLevel.type === 'chaos') { itemCount = 5; optionCount = 10; }
        if (subLevel.type === 'extreme') { itemCount = 6; optionCount = 12; }

        // 随机选出要记忆的物品
        var shuffledItems = Phaser.Utils.Array.Shuffle(MEMORY_ITEMS.slice());
        var targetItems = shuffledItems.slice(0, itemCount);
        // 干扰项（确保不重复）
        var distractorItems = shuffledItems.slice(itemCount, optionCount);

        // ---- 显示阶段 ----
        var showDuration = GS.devices.memory ? 4000 : 2500;
        if (GS.devices.magnifier) showDuration += 1500;
        if (subLevel.type === 'extreme') showDuration -= 800;
        showDuration = Math.max(1500, showDuration);

        // 计算网格布局
        var cols = Math.ceil(Math.sqrt(itemCount));
        var gridSize = subLevel.type === 'extreme' ? 60 : 70;
        var gridGap = 10;
        var startX = W / 2 - (cols * (gridSize + gridGap) - gridGap) / 2;
        var startY = H / 2 - 40;

        var showElements = [];
        targetItems.forEach(function(item, i) {
            var col = i % cols;
            var row = Math.floor(i / cols);
            var ix = startX + col * (gridSize + gridGap) + gridSize / 2;
            var iy = startY + row * (gridSize + gridGap) + gridSize / 2;

            // 物品背景
            var bg = self.add.graphics().setDepth(55);
            bg.fillStyle(0x252540, 0.95);
            bg.fillRoundedRect(ix - gridSize / 2, iy - gridSize / 2, gridSize, gridSize, 8);
            bg.lineStyle(2, 0x555566, 0.6);
            bg.strokeRoundedRect(ix - gridSize / 2, iy - gridSize / 2, gridSize, gridSize, 8);
            bg.setAlpha(0);

            // 物品图标
            var icon = self.add.image(ix, iy, item.id).setScale(gridSize / 72).setDepth(56).setAlpha(0);

            // 标签
            var label = self.add.text(ix, iy + gridSize / 2 + 2, item.label, {
                fontSize: '12px', color: '#AAABCC'
            }).setOrigin(0.5, 0).setDepth(56).setAlpha(0);

            showElements.push({ bg: bg, icon: icon, label: label });

            // 入场动画
            self.tweens.add({ targets: [bg, icon, label], alpha: 1, duration: 350, delay: i * 120 });
        });

        var countdownText = self.add.text(W / 2, startY - 60, '记住这 ' + itemCount + ' 个物品！' + (showDuration / 1000).toFixed(0) + '秒后消失', {
            fontSize: '16px', color: '#FFD93D'
        }).setOrigin(0.5).setDepth(56);

        // 第四重障碍：视觉遮罩干扰记忆阶段
        if (this.aging.visual >= 2) {
            var fogOverlay = self.add.graphics().setDepth(54).setAlpha(0);
            fogOverlay.fillStyle(0xDDDDEE, 0.3);
            fogOverlay.fillRect(startX - 20, startY - 20, cols * (gridSize + gridGap) + 20, Math.ceil(itemCount / cols) * (gridSize + gridGap) + 20);
            self.tweens.add({ targets: fogOverlay, alpha: 1, duration: 800, delay: 600 });
            showElements.push({ bg: fogOverlay, icon: null, label: null });
        }

        // ---- 消失后进入选择阶段 ----
        self.time.delayedCall(showDuration, function() {
            if (self.isRoundOver) return;
            countdownText.setText('物品已隐藏！从选项中找出刚才的物品');
            showElements.forEach(function(el) {
                if (el.bg && el.bg.active) self.tweens.add({ targets: el.bg, alpha: 0, duration: 300 });
                if (el.icon && el.icon.active) self.tweens.add({ targets: el.icon, alpha: 0, duration: 300 });
                if (el.label && el.label.active) self.tweens.add({ targets: el.label, alpha: 0, duration: 300 });
            });

            // 构建选项列表：目标物品 + 干扰项，打乱
            var allOptions = Phaser.Utils.Array.Shuffle(
                targetItems.concat(distractorItems)
            );

            // ---- 选项网格 ----
            var optCols = 4;
            var optSize = 54;
            var optGapX = 12;
            var optGapY = 8;
            var optStartX = W / 2 - (optCols * (optSize + optGapX) - optGapX) / 2;
            var optStartY = H / 2 + 10;

            var selectedItems = [];
            var answered = false;

            allOptions.forEach(function(opt, i) {
                var col = i % optCols;
                var row = Math.floor(i / optCols);
                var ox = optStartX + col * (optSize + optGapX) + optSize / 2;
                var oy = optStartY + row * (optSize + optGapY) + optSize / 2;

                var obg = self.add.graphics().setDepth(57);
                obg.fillStyle(0x2A2A40, 0.9);
                obg.fillRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                obg.lineStyle(1, 0x555566, 0.5);
                obg.strokeRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);

                var oicon = self.add.image(ox, oy - 4, opt.id).setScale(optSize / 78).setDepth(58);
                var olabel = self.add.text(ox, oy + optSize / 2 - 4, opt.label, {
                    fontSize: '9px', color: '#8888AA'
                }).setOrigin(0.5, 0).setDepth(58);

                // 点击区域
                var hitArea = self.add.zone(ox, oy, optSize, optSize).setInteractive({ useHandCursor: true }).setDepth(59);

                hitArea.on('pointerdown', function() {
                    if (answered || self.isRoundOver) return;
                    AudioFX.click();

                    // 检查是否是目标物品
                    var isTarget = targetItems.some(function(t) { return t.id === opt.id; });
                    var alreadySelected = selectedItems.some(function(s) { return s.id === opt.id; });

                    if (isTarget && !alreadySelected) {
                        // 正确！
                        selectedItems.push(opt);
                        obg.clear();
                        obg.fillStyle(0x1B3A1B, 0.9);
                        obg.fillRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                        obg.lineStyle(2, 0x4CAF50);
                        obg.strokeRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                        olabel.setColor('#4CAF50');
                        AudioFX.coin();
                        self.roundHits++;
                        self.roundCoins++;
                        GS.coins++;
                        GS.totalHits++;
                        self.coinText.setText('' + GS.coins);
                        self.updateRoundStat();
                        countdownText.setText('已找到 ' + selectedItems.length + ' / ' + itemCount);

                        if (selectedItems.length >= itemCount) {
                            answered = true;
                            AudioFX.levelUp();
                            countdownText.setText('🎉 全部找到！共 ' + itemCount + ' 件');
                            self.time.delayedCall(1200, function() {
                                if (!self.isRoundOver) self.endRound();
                            });
                        }
                    } else if (alreadySelected) {
                        // 已选过
                        self.showFloatText(ox, oy - 20, '已选', '#8888AA');
                    } else {
                        // 错误
                        obg.clear();
                        obg.fillStyle(0x3A1B1B, 0.9);
                        obg.fillRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                        obg.lineStyle(2, 0xCC4444);
                        obg.strokeRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                        olabel.setColor('#CC4444');
                        AudioFX.miss();
                        self.roundMisses++;
                        GS.totalMisses++;
                        self.showFloatText(ox, oy - 20, '不是这个', '#CC0000');
                        self.updateRoundStat();

                        // 错太多就结束
                        if (self.roundMisses > itemCount + 2) {
                            answered = true;
                            countdownText.setText('记忆已模糊…找到 ' + selectedItems.length + ' / ' + itemCount);
                            // 高亮所有未找到的正确答案
                            allOptions.forEach(function(o, j) {
                                var isRemain = targetItems.some(function(t) { return t.id === o.id; });
                                var notFound = !selectedItems.some(function(s) { return s.id === o.id; });
                                if (isRemain && notFound) {
                                    var oc = j % optCols, or = Math.floor(j / optCols);
                                    var ox2 = optStartX + oc * (optSize + optGapX) + optSize / 2;
                                    var oy2 = optStartY + or * (optSize + optGapY) + optSize / 2;
                                    var hg = self.add.graphics().setDepth(62);
                                    hg.fillStyle(0x1B3A1B, 0.7);
                                    hg.fillRoundedRect(ox2 - optSize / 2, oy2 - optSize / 2, optSize, optSize, 8);
                                    hg.lineStyle(2, 0x4CAF50);
                                    hg.strokeRoundedRect(ox2 - optSize / 2, oy2 - optSize / 2, optSize, optSize, 8);
                                }
                            });
                            self.time.delayedCall(2000, function() {
                                if (!self.isRoundOver) self.endRound();
                            });
                        }
                    }
                });

                hitArea.on('pointerover', function() {
                    if (answered || selectedItems.some(function(s) { return s.id === opt.id; })) return;
                    obg.clear();
                    obg.fillStyle(0x3A3A50, 0.9);
                    obg.fillRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                    obg.lineStyle(1, 0xFFD93D);
                    obg.strokeRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                });
                hitArea.on('pointerout', function() {
                    if (answered || selectedItems.some(function(s) { return s.id === opt.id; })) return;
                    obg.clear();
                    obg.fillStyle(0x2A2A40, 0.9);
                    obg.fillRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                    obg.lineStyle(1, 0x555566, 0.5);
                    obg.strokeRoundedRect(ox - optSize / 2, oy - optSize / 2, optSize, optSize, 8);
                });
            });

            // 20秒超时
            self.time.delayedCall(20000, function() {
                if (answered || self.isRoundOver) return;
                answered = true;
                countdownText.setText('时间到！找到 ' + selectedItems.length + ' / ' + itemCount);
                self.time.delayedCall(1500, function() {
                    if (!self.isRoundOver) self.endRound();
                });
            });
        });
    }

    // ---------- 认知扭曲挑战：Stroop效应 — 字的颜色不等于字的意思 ----------
    startCognitiveDistortionChallenge() {
        var self = this;
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var chapter = CHAPTERS[GS.chapter - 1];
        var subLevel = chapter.subLevels[this.subLevelIdx] || { type: 'stroop' };

        this.roundStatText.setText('认知挑战：选字的真实颜色，别读字！');

        // 颜色定义：显示色名 → 实际渲染色值
        var colorPalette = [
            { name: '红', hex: '#FF4444', rgb: 0xFF4444 },
            { name: '蓝', hex: '#4488FF', rgb: 0x4488FF },
            { name: '绿', hex: '#44CC44', rgb: 0x44CC44 },
            { name: '黄', hex: '#EEEE00', rgb: 0xEEEE00 },
            { name: '紫', hex: '#CC44CC', rgb: 0xCC44CC }
        ];

        var roundCount = subLevel.type === 'extreme' ? 10 : (subLevel.type === 'chaos' ? 8 : 6);
        var timePerRound = subLevel.type === 'extreme' ? 2500 : (subLevel.type === 'chaos' ? 3500 : 4500);
        if (GS.devices.memory) timePerRound += 800;
        var currentIdx = 0;
        var totalCorrect = 0;
        var totalWrong = 0;
        var answered = false;

        // 按钮尺寸和位置
        var btnW = 100, btnH = 48;
        var btnY = H / 2 + 40;
        var totalBtnW = colorPalette.length * btnW + (colorPalette.length - 1) * 10;
        var btnStartX = W / 2 - totalBtnW / 2 + btnW / 2;

        // 颜色按钮（固定）
        var colorBtns = [];
        var btnGraphics = [];
        colorPalette.forEach(function(cp, i) {
            var bx = btnStartX + i * (btnW + 10);
            var bg = self.add.graphics().setDepth(62);
            bg.fillStyle(cp.rgb, 0.85);
            bg.fillRoundedRect(bx - btnW / 2, btnY - btnH / 2, btnW, btnH, 12);
            bg.lineStyle(2, 0xFFFFFF, 0.4);
            bg.strokeRoundedRect(bx - btnW / 2, btnY - btnH / 2, btnW, btnH, 12);
            btnGraphics.push(bg);

            var label = self.add.text(bx, btnY, cp.name, {
                fontSize: '20px', color: '#FFFFFF', fontStyle: 'bold'
            }).setOrigin(0.5).setDepth(63);

            var hit = self.add.zone(bx, btnY, btnW, btnH).setInteractive({ useHandCursor: true }).setDepth(64);

            hit.on('pointerover', function() {
                bg.clear();
                bg.fillStyle(cp.rgb, 0.95);
                bg.fillRoundedRect(bx - btnW / 2, btnY - btnH / 2, btnW, btnH, 12);
                bg.lineStyle(3, 0xFFFFFF, 0.8);
                bg.strokeRoundedRect(bx - btnW / 2, btnY - btnH / 2, btnW, btnH, 12);
            });
            hit.on('pointerout', function() {
                if (answered) return;
                bg.clear();
                bg.fillStyle(cp.rgb, 0.85);
                bg.fillRoundedRect(bx - btnW / 2, btnY - btnH / 2, btnW, btnH, 12);
                bg.lineStyle(2, 0xFFFFFF, 0.4);
                bg.strokeRoundedRect(bx - btnW / 2, btnY - btnH / 2, btnW, btnH, 12);
            });

            colorBtns.push({ bg: bg, label: label, hit: hit, cp: cp, bx: bx, by: btnY });
        });

        var promptText = self.add.text(W / 2, H / 2 - 60, '', {
            fontSize: '24px', color: '#DDDDEE'
        }).setOrigin(0.5).setDepth(65);

        var scoreText = self.add.text(W / 2, 70, '', {
            fontSize: '14px', color: '#8888AA'
        }).setOrigin(0.5).setDepth(65);

        // 视觉扭曲遮罩（第五章视野更模糊）
        var fogG = self.add.graphics().setDepth(60);
        fogG.fillStyle(0xCCCCDD, 0.2);
        fogG.fillRect(0, H / 2 - 80, W, 160);
        fogG.fillStyle(0xCCCCDD, 0.12);
        fogG.fillRect(0, 0, W, H);

        function nextPrompt() {
            if (self.isRoundOver || currentIdx >= roundCount) {
                // 全部完成
                finishChallenge();
                return;
            }

            answered = false;
            currentIdx++;
            scoreText.setText('第 ' + currentIdx + '/' + roundCount + ' 题  |  对: ' + totalCorrect + '  错: ' + totalWrong);

            // 随机选一个实际颜色和冲突的文字
            var showColorIdx = Phaser.Math.Between(0, colorPalette.length - 1);
            var wordColor = colorPalette[showColorIdx];

            // 文字内容必须≠实际颜色（这才是Stroop的核心冲突）
            var wordIdx;
            do { wordIdx = Phaser.Math.Between(0, colorPalette.length - 1); } while (wordIdx === showColorIdx);
            var wordText = colorPalette[wordIdx].name; // 字面上写的颜色名

            // 颜色单词提示
            promptText.setText('');
            promptText.setColor(wordColor.hex);
            promptText.setText('「' + wordText + '」');
            promptText.setData('correctIdx', showColorIdx);

            // 跳动效果引起注意
            self.tweens.add({
                targets: promptText, scaleX: 1.15, scaleY: 1.15, duration: 200, yoyo: true,
                onComplete: function() { promptText.setScale(1); }
            });

            // 超时
            var timeoutId = self.time.delayedCall(timePerRound, function() {
                if (answered || self.isRoundOver) return;
                answered = true;
                totalWrong++;
                self.roundMisses++;
                GS.totalMisses++;
                AudioFX.miss();
                self.showFloatText(W / 2, H / 2 - 90, '超时！是 ' + wordColor.name + ' 色', '#CC4444');
                self.updateRoundStat();

                self.time.delayedCall(800, function() {
                    if (self.roundMisses > 4) {
                        finishChallenge();
                    } else {
                        nextPrompt();
                    }
                });
            });

            // 按钮点击处理
            colorBtns.forEach(function(cb, i) {
                cb.hit.removeAllListeners('pointerdown');
                cb.hit.on('pointerdown', function() {
                    if (answered || self.isRoundOver) return;
                    answered = true;
                    if (timeoutId) timeoutId.remove(false);

                    var correctIdx = promptText.getData('correctIdx');
                    if (i === correctIdx) {
                        // 正确！
                        totalCorrect++;
                        self.roundHits++;
                        self.roundCoins++;
                        GS.coins++;
                        GS.totalHits++;
                        self.coinText.setText('' + GS.coins);
                        AudioFX.coin();
                        self.showFloatText(cb.bx, cb.by - 30, '✓', '#4CAF50');
                    } else {
                        // 错误
                        totalWrong++;
                        self.roundMisses++;
                        GS.totalMisses++;
                        AudioFX.miss();
                        self.showFloatText(cb.bx, cb.by - 30, '✗ 应为 ' + wordColor.name, '#CC4444');
                    }
                    self.updateRoundStat();

                    self.time.delayedCall(600, function() {
                        if (self.roundMisses > 4) {
                            finishChallenge();
                        } else {
                            nextPrompt();
                        }
                    });
                });
            });
        }

        function finishChallenge() {
            if (self.isRoundOver) return;
            answerPhase();
            var passThreshold = Math.ceil(roundCount / 2);
            if (totalCorrect >= passThreshold || self.roundHits > 0) {
                self.roundHits = Math.max(self.roundHits, totalCorrect);
                promptText.setText('认知测试完成：' + totalCorrect + '/' + roundCount + ' 正确');
                promptText.setColor('#FFD93D');
            } else {
                promptText.setText('认知混乱太严重…答对 ' + totalCorrect + '/' + roundCount);
                promptText.setColor('#CC4444');
            }
            self.time.delayedCall(1500, function() {
                if (!self.isRoundOver) self.endRound();
            });
        }

        function answerPhase() {
            colorBtns.forEach(function(cb) {
                cb.hit.disableInteractive();
                cb.bg.clear();
                cb.bg.fillStyle(0x333344, 0.6);
                cb.bg.fillRoundedRect(cb.bx - btnW / 2, cb.by - btnH / 2, btnW, btnH, 12);
            });
        }

        // 开始第一题
        self.time.delayedCall(400, function() {
            nextPrompt();
        });
    }

    // ---------- 本轮结束 ----------
    endRound() {
        this.isRoundOver = true;
        this.isPlaying = false;
        HandTremor.disable();

        if (this.blockTimer) { this.blockTimer.remove(); this.blockTimer = null; }

        // 更新章节进度
        GS.chapterRound++;
        GS.level++;

        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;
        var chapter = CHAPTERS[GS.chapter - 1];

        // 检查章节是否完成
        if (GS.chapterRound >= chapter.rounds) {
            // 章节完成 — 进入章末叙事或终章
            AudioFX.levelUp();

            this.time.delayedCall(500, function() {
                VisualAging.destroyOverlay(self);
                AudioFX.setAgingLevel(0, false);
                HandTremor.disable();

                self.cameras.main.fadeOut(600);
                self.time.delayedCall(600, function() {
                    var nextChapId = chapter.id + 1;
                    if (nextChapId <= 5) {
                        // 进入章末叙事
                        var nextChapter = CHAPTERS[nextChapId - 1];
                        GS.chapter = nextChapId;
                        GS.chapterRound = 0;
                        self.scene.start('ChapterNarrativeScene', {
                            mode: 'outro',
                            chapter: chapter,
                            chapterId: chapter.id,
                            lines: chapter.endLines
                        });
                    } else {
                        // 五章全部完成 → 终章揭示
                        GS.chapter = 5; // 标记完成
                        GS.chapterRound = 0;
                        self.scene.start('FinalRevelationScene');
                    }
                });
            });
            return;
        }

        // 章节内继续 — 重新开始本场景
        if (GS.chapter !== 2) AudioFX.levelUp();

        this.time.delayedCall(400, function() {
            // 遮罩
            var mask = self.add.graphics().setDepth(200);
            mask.fillStyle(0x000000, 0.75);
            mask.fillRect(0, 0, W, H);

            // 获取"我"的视角文字和倡议
            var meText = '';
            var advocacyText = '';
            var chapterData = CHAPTERS[GS.chapter - 1];
            if (chapterData.mePerspectives && chapterData.mePerspectives[self.subLevelIdx]) {
                meText = chapterData.mePerspectives[self.subLevelIdx];
            }
            if (chapterData.subLevels && chapterData.subLevels[self.subLevelIdx] && chapterData.subLevels[self.subLevelIdx].advocacy) {
                advocacyText = chapterData.subLevels[self.subLevelIdx].advocacy;
            }

            // 面板（加高以容纳"我"的视角 + 倡议）
            var panelH = 180;
            if (meText) panelH += 170;
            if (advocacyText) panelH += 65;
            var panelG = self.add.graphics().setDepth(201);
            panelG.fillStyle(0x1E1E32, 0.95);
            panelG.fillRoundedRect(W / 2 - 160, H / 2 - panelH / 2, 320, panelH, 14);
            panelG.lineStyle(1, 0x555566, 0.5);
            panelG.strokeRoundedRect(W / 2 - 160, H / 2 - panelH / 2, 320, panelH, 14);
            panelG.setScale(0);
            self.tweens.add({ targets: panelG, scale: 1, duration: 300, ease: 'Back.easeOut' });

            self.add.text(W / 2, H / 2 - panelH / 2 + 30, '✅ 过关！', {
                fontSize: '26px', fontStyle: 'bold', color: '#4CAF50'
            }).setOrigin(0.5).setDepth(202);

            self.add.text(W / 2, H / 2 - panelH / 2 + 60, '命中: ' + self.roundHits + ' | 错过: ' + self.roundMisses + ' | +' + self.roundCoins + ' ⏱', {
                fontSize: '14px', color: '#CCCCDD'
            }).setOrigin(0.5).setDepth(202);

            self.add.text(W / 2, H / 2 - panelH / 2 + 80, '章节进度: ' + GS.chapterRound + '/' + chapter.rounds, {
                fontSize: '13px', color: '#FFD93D'
            }).setOrigin(0.5).setDepth(202);

            // 衰老效果提示
            var effectsText = [];
            if (self.aging.visual > 0) effectsText.push('视觉模糊');
            if (self.aging.hearing > 0) effectsText.push('听力衰退');
            if (self.aging.memory > 0) effectsText.push('记忆模糊');
            if (self.aging.motor > 0) effectsText.push('手抖失控');
            if (effectsText.length > 0) {
                self.add.text(W / 2, H / 2 - panelH / 2 + 98, '当前影响: ' + effectsText.join(' + '), {
                    fontSize: '12px', color: '#FF6B6B'
                }).setOrigin(0.5).setDepth(202);
            }

            // "我"的困惑视角（核心新增）
            if (meText) {
                var lineG = self.add.graphics().setDepth(202);
                lineG.lineStyle(1, 0xFFD93D, 0.2);
                lineG.lineBetween(W / 2 - 130, H / 2 - panelH / 2 + 130, W / 2 + 130, H / 2 - panelH / 2 + 130);

                self.add.text(W / 2, H / 2 - panelH / 2 + 142, '🧑 "我"的想法：', {
                    fontSize: '12px', fontStyle: 'bold', color: '#FFD93D'
                }).setOrigin(0.5).setDepth(202);

                self.add.text(W / 2, H / 2 - panelH / 2 + 168, meText, {
                    fontSize: '13px', color: '#EEAACC', fontStyle: 'italic',
                    wordWrap: { width: 280 }, align: 'center', lineSpacing: 3
                }).setOrigin(0.5).setDepth(202);

                self.add.text(W / 2, H / 2 - panelH / 2 + 248, '— 但这对老人而言，不是游戏，是每一天 —', {
                    fontSize: '11px', color: '#AAABCC'
                }).setOrigin(0.5).setDepth(202);
            }

            // 倡议行动（每个关卡末尾）
            var advocacyY = H / 2 - panelH / 2 + (meText ? 278 : 120);
            if (advocacyText) {
                var advLine = self.add.graphics().setDepth(202);
                advLine.lineStyle(1, 0x4CAF50, 0.3);
                advLine.lineBetween(W / 2 - 130, advocacyY, W / 2 + 130, advocacyY);

                self.add.text(W / 2, advocacyY + 12, advocacyText, {
                    fontSize: '12px', color: '#4CAF50', fontStyle: 'bold',
                    wordWrap: { width: 280 }, align: 'center', lineSpacing: 3
                }).setOrigin(0.5, 0).setDepth(202);
            }

            var btnY = H / 2 + panelH / 2 - 30;
            var btnNext = self.add.image(W / 2, btnY, 'btn_small').setInteractive({ useHandCursor: true }).setDepth(202);
            self.add.text(W / 2, btnY, '▶ 继续', {
                fontSize: '16px', fontStyle: 'bold', color: '#333333'
            }).setOrigin(0.5).setDepth(203);

            btnNext.on('pointerdown', function() {
                AudioFX.click();
                VisualAging.destroyOverlay(self);
                AudioFX.setAgingLevel(0, false);
                HandTremor.disable();
                self.cameras.main.fadeOut(300);
                self.time.delayedCall(300, function() { self.scene.restart(); });
            });
            btnNext.on('pointerover', function() { btnNext.setScale(1.05); });
            btnNext.on('pointerout',  function() { btnNext.setScale(1.0); });
        });
    }

    update(time, delta) {
        // 手抖效果：只在 isPlaying 时生效
        if (HandTremor.enabled && this.isPlaying && this.aging.motor > 0) {
            var p = this.input.activePointer;
            HandTremor.realX = this._tremorPointerRealX;
            HandTremor.realY = this._tremorPointerRealY;
            HandTremor.applyToPointer(p);
        }
    }
}

// ==================== ShopScene ====================
class ShopScene extends Phaser.Scene {
    constructor() { super({ key: 'ShopScene' }); }

    create() {
        var W = this.cameras.main.width, H = this.cameras.main.height;

        // 背景
        var bg = this.add.graphics();
        bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x16213e, 0x16213e);
        bg.fillRect(0, 0, W, H);

        // 标题
        this.add.text(W / 2, 30, '🏪 辅助器具商城', {
            fontSize: '36px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5);

        // 余额
        this.add.image(W / 2 - 160, 68, 'coin').setScale(1.1);
        this.coinDisplay = this.add.text(W / 2 - 130, 60, '余额：' + GS.coins + ' 时间币', {
            fontSize: '20px', fontStyle: 'bold', color: '#FFD93D'
        });

        // 虚拟老人
        var elder = this.add.image(W - 100, H - 140, 'elder').setScale(1.2);

        // 已拥有的器具显示在老人旁边
        this.elderDevices = [];
        var devIconKeys = { magnifier: 'icon_magnifier', mat: 'icon_mat', memory: 'icon_memory', hearing: 'icon_hearing', cane: 'icon_cane' };
        var devPositions = [
            { x: W - 140, y: H - 80 }, { x: W - 60, y: H - 80 }, { x: W - 140, y: H - 45 }, { x: W - 60, y: H - 45 }, { x: W - 100, y: H - 50 }
        ];
        var di = 0;
        for (var did in GS.devices) {
            if (GS.devices[did]) {
                var icon = this.add.image(devPositions[di].x, devPositions[di].y, devIconKeys[did]).setScale(0.7);
                this.elderDevices.push(icon);
                di++;
            }
        }

        // 商品列表
        var startY = 100;
        var self = this;
        DEVICES.forEach(function(dev, i) {
            var yPos = startY + i * 58;
            var owned = GS.devices[dev.id];

            // 商品背景
            var itemBg = self.add.graphics();
            itemBg.fillStyle(owned ? 0x1B3A1B : 0x2A2A40, 0.8);
            itemBg.fillRoundedRect(W / 2 - 280, yPos - 3, 560, 52, 10);
            itemBg.lineStyle(1, owned ? 0x4CAF50 : 0x444466, 0.5);
            itemBg.strokeRoundedRect(W / 2 - 280, yPos - 3, 560, 52, 10);

            // 图标
            self.add.image(W / 2 - 250, yPos + 23, devIconKeys[dev.id]).setScale(0.65);

            // 名称和描述
            self.add.text(W / 2 - 210, yPos + 6, dev.name, {
                fontSize: '18px', fontStyle: 'bold', color: '#FFFFFF'
            });
            self.add.text(W / 2 - 210, yPos + 28, dev.desc + '  |  ' + dev.effect, {
                fontSize: '12px', color: '#8888AA'
            });

            // 价格 / 已拥有
            if (owned) {
                self.add.text(W / 2 + 250, yPos + 18, '✅ 已拥有', {
                    fontSize: '17px', fontStyle: 'bold', color: '#4CAF50'
                }).setOrigin(1, 0.5);
            } else {
                var canBuy = GS.coins >= dev.cost;
                var costColor = canBuy ? '#FFD93D' : '#666666';
                self.add.text(W / 2 + 255, yPos + 8, dev.cost + ' 币', {
                    fontSize: '18px', fontStyle: 'bold', color: costColor
                }).setOrigin(1, 0.5);

                if (canBuy) {
                    var buyBtn = self.add.image(W / 2 + 255, yPos + 32, 'btn_small').setInteractive({ useHandCursor: true }).setScale(0.75);
                    self.add.text(W / 2 + 255, yPos + 32, '购买', {
                        fontSize: '15px', fontStyle: 'bold', color: '#333333'
                    }).setOrigin(0.5);

                    (function(device, btn) {
                        btn.on('pointerover', function() { btn.setScale(0.8); });
                        btn.on('pointerout',  function() { btn.setScale(0.75); });
                        btn.on('pointerdown', function() { self.buyDevice(device); });
                    })(dev, buyBtn);
                } else {
                    self.add.text(W / 2 + 255, yPos + 32, '🔒 余额不足', {
                        fontSize: '13px', color: '#666666'
                    }).setOrigin(1, 0.5);
                }
            }
        });

        // 返回按钮
        var backBtn = this.add.image(W / 2, H - 28, 'btn_small').setInteractive({ useHandCursor: true });
        this.add.text(W / 2, H - 28, '⬅ 返回', {
            fontSize: '16px', fontStyle: 'bold', color: '#333333'
        }).setOrigin(0.5);

        backBtn.on('pointerover', function() { backBtn.setScale(1.05); });
        backBtn.on('pointerout',  function() { backBtn.setScale(1.0); });
        backBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(300);
            self.time.delayedCall(300, function() { self.scene.start('MenuScene'); });
        });

        this.cameras.main.fadeIn(400);
    }

    buyDevice(dev) {
        if (GS.coins < dev.cost || GS.devices[dev.id]) return;

        GS.coins -= dev.cost;
        GS.devices[dev.id] = true;
        AudioFX.buy();

        // 解锁对应知识卡片
        if (GS.knowledgeUnlocked.indexOf(dev.id) === -1) {
            GS.knowledgeUnlocked.push(dev.id);
        }

        // 显示购买成功
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var toast = this.add.text(W / 2, H / 2, '🎉 购买成功！', {
            fontSize: '36px', fontStyle: 'bold', color: '#4CAF50'
        }).setOrigin(0.5).setDepth(300);

        var self = this;
        this.tweens.add({
            targets: toast, y: H / 2 - 30, alpha: 0, duration: 1200, delay: 600,
            onComplete: function() { toast.destroy(); self.scene.restart(); }
        });
    }
}

// ==================== KnowledgeScene ====================
class KnowledgeScene extends Phaser.Scene {
    constructor() { super({ key: 'KnowledgeScene' }); }

    create() {
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        // 背景
        var bg = this.add.graphics();
        bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x0f3460, 0x0f3460);
        bg.fillRect(0, 0, W, H);

        // 标题
        this.add.text(W / 2, 30, '📚 老年关怀知识', {
            fontSize: '32px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5);
        this.add.text(W / 2, 62, '购买辅助器具解锁知识卡片', {
            fontSize: '15px', color: '#8888AA'
        }).setOrigin(0.5);

        // 卡片列表
        this.currentCardIdx = 0;
        this.knowledgeCards = [];

        var cardY = 95;
        KNOWLEDGE_CARDS.forEach(function(card, i) {
            var unlocked = GS.knowledgeUnlocked.indexOf(card.device) !== -1;
            var yPos = cardY + i * 54;

            // 行背景
            var rowBg = self.add.graphics();
            rowBg.fillStyle(unlocked ? 0x1B3A1B : 0x252540, 0.8);
            rowBg.fillRoundedRect(W / 2 - 280, yPos - 2, 560, 48, 8);

            if (unlocked) {
                rowBg.lineStyle(1, 0x4CAF50, 0.3);
                rowBg.strokeRoundedRect(W / 2 - 280, yPos - 2, 560, 48, 8);
            }

            // 序号
            self.add.text(W / 2 - 260, yPos + 22, (i + 1) + '.', {
                fontSize: '18px', fontStyle: 'bold', color: unlocked ? '#4CAF50' : '#555555'
            }).setOrigin(0.5);

            // 标题
            self.add.text(W / 2 - 230, yPos + 12, card.title, {
                fontSize: '19px', fontStyle: 'bold', color: unlocked ? '#FFFFFF' : '#666688'
            });
            self.add.text(W / 2 - 230, yPos + 32, unlocked ? '点击查看详情' : '🔒 未解锁 — 购买 ' + (DEVICES.find(function(d) { return d.id === card.device; }) || {}).name || '', {
                fontSize: '12px', color: unlocked ? '#8888AA' : '#555566'
            });

            if (unlocked) {
                var hitArea = self.add.zone(W / 2, yPos + 22, 560, 48)
                    .setInteractive({ useHandCursor: true }).setDepth(5);
                (function(cardData, cardIdx) {
                    hitArea.on('pointerdown', function() {
                        AudioFX.click();
                        self.showCardDetail(cardData, cardIdx);
                    });
                    hitArea.on('pointerover', function() {
                        rowBg.clear();
                        rowBg.fillStyle(0x2A4A2A, 0.9);
                        rowBg.fillRoundedRect(W / 2 - 280, yPos - 2, 560, 48, 8);
                        rowBg.lineStyle(1, 0x4CAF50, 0.5);
                        rowBg.strokeRoundedRect(W / 2 - 280, yPos - 2, 560, 48, 8);
                    });
                    hitArea.on('pointerout', function() {
                        rowBg.clear();
                        rowBg.fillStyle(0x1B3A1B, 0.8);
                        rowBg.fillRoundedRect(W / 2 - 280, yPos - 2, 560, 48, 8);
                        rowBg.lineStyle(1, 0x4CAF50, 0.3);
                        rowBg.strokeRoundedRect(W / 2 - 280, yPos - 2, 560, 48, 8);
                    });
                })(card, i);
            }
        });

        // 状态
        var unlockedCount = GS.knowledgeUnlocked.length;
        this.add.text(W / 2, H - 50, '已解锁：' + unlockedCount + ' / ' + KNOWLEDGE_CARDS.length + '   |   继续游戏获取时间币来解锁更多', {
            fontSize: '13px', color: '#666688'
        }).setOrigin(0.5);

        // 返回按钮
        var backBtn = this.add.image(W / 2, H - 24, 'btn_small').setInteractive({ useHandCursor: true });
        this.add.text(W / 2, H - 24, '⬅ 返回', {
            fontSize: '16px', fontStyle: 'bold', color: '#333333'
        }).setOrigin(0.5);
        backBtn.on('pointerover', function() { backBtn.setScale(1.05); });
        backBtn.on('pointerout',  function() { backBtn.setScale(1.0); });
        backBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(300);
            self.time.delayedCall(300, function() { self.scene.start('MenuScene'); });
        });

        this.cameras.main.fadeIn(400);
    }

    showCardDetail(card, idx) {
        var W = this.cameras.main.width, H = this.cameras.main.height;
        var self = this;

        // 遮罩
        var mask = this.add.graphics().setDepth(200);
        mask.fillStyle(0x000000, 0.8);
        mask.fillRect(0, 0, W, H);
        mask.setInteractive(); // 防止穿透点击

        // 卡片
        var cardBg = this.add.image(W / 2, H / 2, 'card_bg').setDepth(201).setScale(0);
        this.tweens.add({ targets: cardBg, scale: 1, duration: 300, ease: 'Back.easeOut' });

        // 序号
        this.add.text(W / 2, H / 2 - 120, '第 ' + (idx + 1) + ' 张知识卡片', {
            fontSize: '14px', color: '#8888AA'
        }).setOrigin(0.5).setDepth(202);

        // 标题
        this.add.text(W / 2, H / 2 - 90, card.title, {
            fontSize: '30px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5).setDepth(202);

        // 分隔线
        var line = this.add.graphics().setDepth(202);
        line.lineStyle(1, 0xFFD93D, 0.3);
        line.lineBetween(W / 2 - 180, H / 2 - 55, W / 2 + 180, H / 2 - 55);

        // 知识内容
        this.add.text(W / 2, H / 2 - 25, '📊 你知道吗？', {
            fontSize: '16px', fontStyle: 'bold', color: '#4CAF50'
        }).setOrigin(0.5).setDepth(202);

        this.add.text(W / 2, H / 2 + 5, card.fact, {
            fontSize: '14px', color: '#CCCCDD',
            wordWrap: { width: 400 }, align: 'center', lineSpacing: 4
        }).setOrigin(0.5).setDepth(202);

        // 如何帮助
        this.add.text(W / 2, H / 2 + 65, '💡 你可以这样帮助：', {
            fontSize: '16px', fontStyle: 'bold', color: '#FFD93D'
        }).setOrigin(0.5).setDepth(202);

        this.add.text(W / 2, H / 2 + 92, card.help, {
            fontSize: '14px', color: '#CCCCDD',
            wordWrap: { width: 400 }, align: 'center', lineSpacing: 4
        }).setOrigin(0.5).setDepth(202);

        // 关闭按钮
        var closeBtn = this.add.text(W / 2, H / 2 + 140, '✕ 关闭', {
            fontSize: '20px', fontStyle: 'bold', color: '#8888AA'
        }).setOrigin(0.5).setDepth(202).setInteractive({ useHandCursor: true });

        closeBtn.on('pointerover', function() { closeBtn.setColor('#FFFFFF'); });
        closeBtn.on('pointerout',  function() { closeBtn.setColor('#8888AA'); });
        closeBtn.on('pointerdown', function() {
            AudioFX.click();
            // 销毁卡片相关元素（先复制再遍历防止迭代中修改数组）
            var list = self.children.list.slice();
            list.forEach(function(child) {
                if (child.depth >= 200 && child.depth < 300 && child.active) child.destroy();
            });
        });
    }
}

// ==================== 启动 ====================
window.addEventListener('error', function(e) {
    var fb = document.getElementById('fallback');
    if (fb) {
        fb.style.display = 'block';
        fb.innerHTML = '⚠️ 游戏加载出错：' + (e.message || '未知错误') + '<br>行号：' + (e.lineno || '?');
    }
});

var gameConfig = {
    type: Phaser.AUTO,
    width: 1920,
    height: 1080,
    parent: 'game-wrapper',
    backgroundColor: '#1a1a2e',
    dom: { createContainer: true },
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 1920,
        height: 1080,
        min: { width: 640, height: 360 },
        max: { width: 3840, height: 2160 },
        autoRound: true
    },
    callbacks: {
        postBoot: function(game) {
            // 全屏事件监听
            game.scale.on('enterfullscreen', function() {
                game.scale.lockOrientation('landscape');
            });
        }
    },
    scene: [BootScene, MenuScene, ChapterNarrativeScene, GameScene, FinalRevelationScene, StoriesScene, AgingKnowledgeScene, ShopScene, KnowledgeScene, AIAgingScene, HeatJourneyScene]
};

new Phaser.Game(gameConfig);

})(); }
</script>
