// ==================== 音效引擎 ====================
var AudioFX = {
    ctx: null,
    agingFilter: null,      // 全局听力衰退滤波器
    agingGain: null,        // 衰退音量控制
    agingActive: false,
    agingLevel: 0,          // 0=正常, 1=轻度衰退, 2=中度衰退
    init: function() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch(e) { this.ctx = null; }
        if (this.ctx) {
            // 全局听力衰退链路：source → agingGain → agingFilter → destination
            this.agingFilter = this.ctx.createBiquadFilter();
            this.agingFilter.type = 'lowpass';
            this.agingFilter.frequency.setValueAtTime(20000, this.ctx.currentTime); // 默认不衰减
            this.agingFilter.Q.setValueAtTime(0.7, this.ctx.currentTime);
            this.agingFilter.connect(this.ctx.destination);

            this.agingGain = this.ctx.createGain();
            this.agingGain.gain.setValueAtTime(1.0, this.ctx.currentTime);
            this.agingGain.connect(this.agingFilter);

            this.agingActive = true;
        }
    },
    // 设置全局听力衰退等级
    setAgingLevel: function(level, hasHearingDevice) {
        this.agingLevel = level;
        if (!this.ctx || !this.agingFilter) return;
        var t0 = this.ctx.currentTime;
        var cutoff;
        if (hasHearingDevice) {
            // 助听器改善
            cutoff = (level === 0) ? 20000 : (level === 1) ? 6000 : 3500;
        } else {
            cutoff = (level === 0) ? 20000 : (level === 1) ? 2500 : 1200;
        }
        this.agingFilter.frequency.linearRampToValueAtTime(cutoff, t0 + 0.5);
        var vol = hasHearingDevice ? 1.0 : (level === 0 ? 1.0 : level === 1 ? 0.8 : 0.65);
        this.agingGain.gain.linearRampToValueAtTime(vol, t0 + 0.5);
    },
    // 获取当前应连接的输出节点（绕过或不绕过衰老滤波器）
    _output: function() {
        if (this.agingActive && this.agingGain && this.agingLevel > 0) {
            return this.agingGain;
        }
        return this.ctx.destination;
    },
    _tone: function(f, d, t, v, r) {
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        var t0 = this.ctx.currentTime;
        var o = this.ctx.createOscillator();
        var g = this.ctx.createGain();
        o.type = t || 'sine';
        o.frequency.setValueAtTime(f, t0);
        g.gain.setValueAtTime(v || 0.3, t0);
        if (r) g.gain.linearRampToValueAtTime(0.001, t0 + d);
        o.connect(g);
        g.connect(this._output());
        o.start(t0); o.stop(t0 + d);
    },
    coin: function() {
        this._tone(1200, 0.08, 'sine', 0.25, true);
        var ctx = this.ctx; if (!ctx) return;
        var self = this;
        setTimeout(function() {
            var o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(1600, ctx.currentTime);
            g.gain.setValueAtTime(0.25, ctx.currentTime);
            g.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.12);
            o.connect(g); g.connect(self._output());
            o.start(); o.stop(ctx.currentTime + 0.12);
        }, 70);
    },
    miss: function() { this._tone(250, 0.2, 'triangle', 0.15, true); },
    click: function() { this._tone(800, 0.05, 'sine', 0.18, true); },
    buy: function() {
        var ns = [523, 659, 784, 1047], self = this;
        ns.forEach(function(f, i) {
            setTimeout(function() { self._tone(f, 0.18, 'sine', 0.25, true); }, i * 100);
        });
    },
    levelUp: function() {
        var ns = [392, 523, 659, 784, 1047], self = this;
        ns.forEach(function(f, i) {
            setTimeout(function() { self._tone(f, 0.15, 'triangle', 0.22, true); }, i * 80);
        });
    },
    fail: function() { this._tone(180, 0.4, 'sawtooth', 0.18, true); },
    // 听力挑战 — 通过低通滤波器播放模糊音调序列（模拟老年听力下降）
    playHearingPattern: function(tones, hearingAssisted, callback) {
        if (!this.ctx) { if (callback) { setTimeout(callback, tones.length * 400 + 500); } return; }
        if (this.ctx.state === 'suspended') this.ctx.resume();
        var ctx = this.ctx;
        var t0 = ctx.currentTime;
        // 低通滤波器：模拟高频听力丧失；助听器可提高截止频率
        var cutoffFreq = hearingAssisted ? 2200 : 650;
        var filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(cutoffFreq, t0);
        filter.Q.setValueAtTime(0.8, t0);
        filter.connect(this._output());
        // 背景白噪声（模拟环境嘈杂，助听器可降低噪声）
        var noiseLevel = hearingAssisted ? 0.02 : 0.06;
        var noiseLen = tones.length * 0.4 + 0.6;
        var noiseBuffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * noiseLen), ctx.sampleRate);
        var noiseData = noiseBuffer.getChannelData(0);
        for (var i = 0; i < noiseData.length; i++) noiseData[i] = (Math.random() * 2 - 1) * noiseLevel;
        var noiseSrc = ctx.createBufferSource();
        noiseSrc.buffer = noiseBuffer;
        var noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(noiseLevel, t0);
        noiseSrc.connect(noiseGain); noiseGain.connect(this._output());
        noiseSrc.start(t0); noiseSrc.stop(t0 + noiseLen);
        // 依次播放音调
        for (var j = 0; j < tones.length; j++) {
            var o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'triangle';
            var st = t0 + j * 0.4;
            o.frequency.setValueAtTime(tones[j], st);
            g.gain.setValueAtTime(0.35, st);
            g.gain.linearRampToValueAtTime(0.001, st + 0.28);
            o.connect(g); g.connect(filter);
            o.start(st); o.stop(st + 0.32);
        }
        if (callback) { setTimeout(callback, tones.length * 400 + 600); }
    }
};

// ==================== 语音合成引擎 (Web Speech API) ====================
var VoiceFX = {
    synth: null,
    speaking: false,
    pendingCallback: null,
    muffled: false,
    init: function() {
        try { this.synth = window.speechSynthesis; } catch(e) { this.synth = null; }
    },
    // 开启/关闭语音模糊
    setMuffled: function(on) { this.muffled = !!on; },
    speak: function(text, rate, pitch, onEnd) {
        if (!this.synth) {
            if (onEnd) onEnd();
            return;
        }
        if (this.synth.speaking) { this.synth.cancel(); }
        this.pendingCallback = onEnd || null;
        var self = this;
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN';
        if (this.muffled) {
            // 模糊语音: 降低音高 + 降低语速 + 降低音量 = 模拟听不清
            u.rate = (rate || 0.85) * 0.82;
            u.pitch = (pitch || 1.0) * 0.55;
            u.volume = 0.7;
            AudioDistorter.startNoise();
        } else {
            u.rate = rate || 0.85;
            u.pitch = pitch || 1.0;
            u.volume = 0.9;
        }
        u.onend = function() {
            self.speaking = false;
            AudioDistorter.stopNoise();
            var cb = self.pendingCallback;
            self.pendingCallback = null;
            if (cb) cb();
        };
        u.onerror = function() {
            self.speaking = false;
            AudioDistorter.stopNoise();
            var cb = self.pendingCallback;
            self.pendingCallback = null;
            if (cb) cb();
        };
        this.speaking = true;
        this.synth.speak(u);
    },
    stop: function() {
        this.speaking = false;
        this.pendingCallback = null;
        AudioDistorter.stopNoise();
        if (this.synth) { this.synth.cancel(); }
    }
};

// ==================== 语音模糊噪声生成 ====================
var AudioDistorter = {
    ctx: null,
    noiseSrc: null,
    gainNode: null,
    init: function() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { this.ctx = null; }
    },
    startNoise: function() {
        if (!this.ctx) return;
        this.stopNoise();
        // 生成 3 秒棕色噪声缓冲（低频为主，模拟模糊感）
        var sr = this.ctx.sampleRate;
        var duration = 3;
        var buf = this.ctx.createBuffer(1, sr * duration, sr);
        var data = buf.getChannelData(0);
        var lastOut = 0;
        for (var i = 0; i < data.length; i++) {
            var white = Math.random() * 2 - 1;
            // 布朗噪声 = 低频加重（积分白噪声）
            lastOut = (lastOut + (0.02 * white)) / 1.02;
            data[i] = lastOut * 3.5;
        }
        this.noiseSrc = this.ctx.createBufferSource();
        this.noiseSrc.buffer = buf;
        this.noiseSrc.loop = true;
        // 低通滤波 = 进一步只留低频
        var lp = this.ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 500;
        lp.Q.value = 0.5;
        this.gainNode = this.ctx.createGain();
        this.gainNode.gain.value = 0.12;
        this.noiseSrc.connect(lp);
        lp.connect(this.gainNode);
        this.gainNode.connect(this.ctx.destination);
        this.noiseSrc.start();
    },
    stopNoise: function() {
        if (this.noiseSrc) {
            try { this.noiseSrc.stop(); } catch(e) {}
            this.noiseSrc.disconnect();
            this.noiseSrc = null;
        }
        if (this.gainNode) {
            this.gainNode.disconnect();
            this.gainNode = null;
        }
    }
};

// ==================== 手抖模拟系统 ====================
var HandTremor = {
    enabled: false,
    intensity: 0,
    startTime: 0,
    // 暂存真实指针位置（每次 pointermove 更新）
    realX: 0,
    realY: 0,
    init: function() {
        this.realX = 0;
        this.realY = 0;
    },
    setEnabled: function(on, inten) {
        this.enabled = !!on;
        this.intensity = inten || 0;
        this.startTime = performance.now();
        if (!on) {
            // 清除 CSS 抖动
            var gv = document.getElementById('game-wrapper');
            if (gv) gv.style.transform = '';
        }
    },
    enableForScene: function(scene, level) {
        this.intensity = level || 0;
        this.enabled = this.intensity > 0;
        this.startTime = performance.now();
    },
    disable: function() {
        this.enabled = false;
        this.intensity = 0;
        var gv = document.getElementById('game-wrapper');
        if (gv) gv.style.transform = '';
    },
    // 获取当前抖动偏移
    getJitter: function() {
        if (!this.enabled || this.intensity <= 0) return { x: 0, y: 0 };
        var t = (performance.now() - this.startTime) * 0.001;
        var amp = this.intensity;
        // 加大振幅倍率：模拟真实手部震颤（多条不同频率的正弦波叠加）
        var damp = GS.devices.cane ? 0.5 : 1.0; // 拐杖减半抖动
        return {
            x: (Math.sin(t * 3.7 + 1.2) * amp * 5.5 +
                Math.sin(t * 5.9 + 2.3) * amp * 3.5 +
                Math.sin(t * 8.3 + 0.7) * amp * 2.0) * damp,
            y: (Math.cos(t * 4.2 + 3.1) * amp * 5.0 +
                Math.cos(t * 5.5 + 1.5) * amp * 3.0 +
                Math.cos(t * 7.8 + 2.9) * amp * 2.0) * damp
        };
    },
    // 应用到指针（每帧 update 调用）
    applyToPointer: function(pointer) {
        if (!this.enabled || this.intensity <= 0) return;
        var j = this.getJitter();
        // 修改活跃指针的坐标，影响点击判定
        pointer.x = this.realX + j.x;
        pointer.y = this.realY + j.y;
        pointer.worldX = pointer.x;
        pointer.worldY = pointer.y;
        // CSS 画布抖动（视觉反馈）
        var gv = document.getElementById('game-wrapper');
        if (gv) {
            gv.style.transform = 'translate(' + j.x + 'px,' + j.y + 'px)';
        }
    }
};

// ==================== 视觉老化遮罩系统 ====================
var VisualAging = {
    // 在场景中创建/更新视觉老化遮罩
    createOverlay: function(scene, level, hasMagnifier) {
        var W = scene.cameras.main.width;
        var H = scene.cameras.main.height;
        var depth = 180; // 在HUD之上但在弹窗之下

        // 清理旧遮罩
        if (scene._agingOverlay) {
            scene._agingOverlay.forEach(function(el) { if (el && el.active) el.destroy(); });
        }
        scene._agingOverlay = [];

        // 根据等级和放大镜决定强度
        var vignetteAlpha, fogAlpha, desaturateAlpha, blurOpacity;
        if (hasMagnifier) {
            // 放大镜减弱视觉老化
            vignetteAlpha = level === 0 ? 0 : level === 1 ? 0.10 : 0.20;
            fogAlpha      = level === 0 ? 0 : level === 1 ? 0.04 : 0.08;
            desaturateAlpha = level === 0 ? 0 : level === 1 ? 0.03 : 0.05;
            blurOpacity   = level === 0 ? 0 : level === 1 ? 0.08 : 0.12;
        } else {
            vignetteAlpha = level === 0 ? 0 : level === 1 ? 0.22 : 0.26;
            fogAlpha      = level === 0 ? 0 : level === 1 ? 0.06 : 0.07;
            desaturateAlpha = level === 0 ? 0 : level === 1 ? 0.05 : 0.06;
            blurOpacity   = level === 0 ? 0 : level === 1 ? 0.12 : 0.15;
        }

        if (level === 0) return;

        // 1) 暗角遮罩（隧道视野效果）
        if (vignetteAlpha > 0) {
            var vignette = scene.add.graphics().setDepth(depth).setAlpha(vignetteAlpha);
            // 中心透明，四周渐暗
            var cx = W / 2, cy = H / 2;
            var maxR = Math.sqrt(cx * cx + cy * cy);
            var steps = 40;
            for (var i = steps; i >= 0; i--) {
                var t = i / steps;
                var r = maxR * (0.35 + t * 0.65);
                var a = vignetteAlpha * (1 - Math.pow(1 - t, 3));
                vignette.fillStyle(0x000000, a);
                vignette.fillCircle(cx, cy, r);
            }
            scene._agingOverlay.push(vignette);
        }

        // 2) 对比度降低 + 色彩饱和度下降（半透明灰色遮罩）
        if (desaturateAlpha > 0) {
            var desat = scene.add.graphics().setDepth(depth + 1).setAlpha(desaturateAlpha);
            desat.fillStyle(0x888899);
            desat.fillRect(0, 0, W, H);
            scene._agingOverlay.push(desat);
        }

        // 3) 雾状遮罩（白色朦胧感）
        if (fogAlpha > 0) {
            var fog = scene.add.graphics().setDepth(depth + 2).setAlpha(fogAlpha);
            fog.fillStyle(0xDDDDEE);
            fog.fillRect(0, 0, W, H);
            scene._agingOverlay.push(fog);
        }

        // 4) 模糊模拟：半透明覆盖层（用噪点纹理模拟）
        if (blurOpacity > 0) {
            var blurLayer = scene.add.image(W / 2, H / 2, 'aging_noise').setDepth(depth + 3).setAlpha(blurOpacity);
            blurLayer.setScale(W / 256, H / 256);
            scene._agingOverlay.push(blurLayer);
        }

        // 视觉老化标签（底部居中）
        var labelText = hasMagnifier ? '🔍 视觉辅助开启中' : (level === 2 ? '⚠️ 重度视觉模糊' : '⚠️ 视觉模糊');
        var label = scene.add.text(W / 2, H - 8, labelText, {
            fontSize: '11px', color: hasMagnifier ? '#4CAF50' : '#FFD93D',
            backgroundColor: 'rgba(0,0,0,0.5)', padding: { x: 8, y: 2 }
        }).setOrigin(0.5, 1).setDepth(depth + 4).setAlpha(level > 0 ? 1 : 0);
        scene._agingOverlay.push(label);
    },

    // 清理遮罩
    destroyOverlay: function(scene) {
        if (scene._agingOverlay) {
            scene._agingOverlay.forEach(function(el) { if (el && el.active) el.destroy(); });
            scene._agingOverlay = [];
        }
    }
};

        uploadBox.lineStyle(2, 0x555566, 0.5);
        uploadBox.strokeRoundedRect(W / 2 - 180, uploadY, 360, uploadH, 16);
        // 虚线装饰
        uploadBox.lineStyle(1, 0x888899, 0.35);

            uploadBox.lineBetween(W / 2 - 150, uploadY + 35 + dy, W / 2 + 150, uploadY + 35 + dy);
            dy += 5;
        }

        // 上传图标和提示
        this.add.text(W / 2, uploadY + 40, '📷', { fontSize: '48px' }).setOrigin(0.5);
        this.add.text(W / 2, uploadY + 88, '点击此处上传照片', {
            fontSize: '20px', fontStyle: 'bold', color: '#CCCCDD'
        }).setOrigin(0.5);
        this.add.text(W / 2, uploadY + 118, '支持 .jpg / .png · 建议正面清晰照片', {
            fontSize: '13px', color: '#777799'

        this.add.text(W / 2, uploadY + 148, '⚠ 照片仅在本设备处理，不上传任何服务器', {

        }).setOrigin(0.5);

        // 隐藏的 file input
        var fileInput = this.add.dom(W / 2, uploadY + 100, 'input')

        fileInput.node.type = 'file';
        fileInput.node.accept = 'image/png,image/jpeg';

        // 结果展示容器（初始隐藏）
        var resultContainer = [];
        var resultVisible = false;

        // ===== 点击上传区域 =====
        var uploadHit = this.add.zone(W / 2, uploadY + uploadH / 2, 360, uploadH)
            .setInteractive({ useHandCursor: true }).setDepth(5);

        uploadHit.on('pointerover', function() {
            uploadBox.clear();
            uploadBox.fillStyle(0x333355, 0.85);
            uploadBox.fillRoundedRect(W / 2 - 180, uploadY, 360, uploadH, 16);
            uploadBox.lineStyle(2, 0xFFD93D, 0.6);
            uploadBox.strokeRoundedRect(W / 2 - 180, uploadY, 360, uploadH, 16);
        });
        uploadHit.on('pointerout', function() {
            if (resultVisible) return;
            uploadBox.clear();
            uploadBox.fillStyle(0x2A2A40, 0.7);
            uploadBox.fillRoundedRect(W / 2 - 180, uploadY, 360, uploadH, 16);
            uploadBox.lineStyle(2, 0x555566, 0.5);
            uploadBox.strokeRoundedRect(W / 2 - 180, uploadY, 360, uploadH, 16);
        });

        uploadHit.on('pointerdown', function() {
            var el = fileInput.node;
            if (el) {
                el.value = '';
                el.click();
            }
        });

        // 文件选择处理
        fileInput.node.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            processImage(file);
        });

        // 拖拽支持（全局监听）
        var dropZoneVisible = true;
        this.input.on('dragenter', function(pointer, gameObject) {
            if (!resultVisible) {
                uploadBox.clear();
                uploadBox.fillStyle(0x3A4A3A, 0.9);
                uploadBox.fillRoundedRect(W / 2 - 180, uploadY, 360, uploadH, 16);
                uploadBox.lineStyle(3, 0x4CAF50, 0.8);
                uploadBox.strokeRoundedRect(W / 2 - 180, uploadY, 360, uploadH, 16);
            }
        });
        this.input.on('dragleave', function() {
            if (!resultVisible) {
                uploadBox.clear();
                uploadBox.fillStyle(0x2A2A40, 0.7);
                uploadBox.fillRoundedRect(W / 2 - 180, uploadY, 360, uploadH, 16);
                uploadBox.lineStyle(2, 0x555566, 0.5);

        // ===== 核心：照片处理函数 =====

                    });

                    // 生成变老前后的对比

                    var titleLeft = self.add.text(W / 2 - 190, 110, '📷 现在的你', {

                    // 缩放适配

                    origImg.setScale(scale);

                    // 右侧：老化后的图片
                    var agedTexName = 'aged_photo_' + Date.now();
                    agedTexName = agedTexName.substring(0, 60);
                    self.textures.addImage(agedTexName, agedCanvas);
                    var agedImg = self.add.image(W / 2 + 190, 270, agedTexName).setDepth(10);
                    var agedScale = Math.min(maxW / agedCanvas.width, maxH / agedCanvas.height);
                    agedImg.setScale(agedScale);

                    resultContainer.push(origImg, agedImg);

                    // 中间分隔箭头
                    self.add.text(W / 2, 270, '→', {
                        fontSize: '36px', color: '#FFD93D', fontStyle: 'bold'
                    }).setOrigin(0.5).setDepth(10);

                    // 底部说明
                    self.add.text(W / 2, 420, '✨ 效果仅用于体验衰老感受，并非精确医学预测', {

                    // 按钮行

                    var downloadBtn = self.add.image(W / 2 - 150, btnRowY, 'btn_med').setInteractive({ useHandCursor: true }).setDepth(10);

                    }).setOrigin(0.5).setDepth(11);
                    resultContainer.push(retryBtn, retryTxt);

                    retryBtn.on('pointerdown', function() {

        // ===== 核心老化算法 =====
        function applyAging(img) {
            var c = document.createElement('canvas');
            var ctx = c.getContext('2d');

            // 缩放到合理尺寸
            var targetW = Math.min(img.width, 600);
            var targetH = Math.round(img.height * (targetW / img.width));
            c.width = targetW;
            c.height = targetH;

            // 1) 绘制原图
            ctx.drawImage(img, 0, 0, targetW, targetH);
            var imageData = ctx.getImageData(0, 0, targetW, targetH);
            var data = imageData.data;

            // 2) 肤色暖化 + 去饱和（老化肤色）
            for (var i = 0; i < data.length; i += 4) {
                var r = data[i], g = data[i + 1], b = data[i + 2];

                // 转灰度并混合（降低饱和度 40%）
                var gray = 0.299 * r + 0.587 * g + 0.114 * b;
                r = r * 0.6 + gray * 0.4;
                g = g * 0.6 + gray * 0.4;
                b = b * 0.6 + gray * 0.4;

                // 暖色调偏移（皮肤老化发黄）
                r = Math.min(255, r + 15);
                g = Math.min(255, g + 5);
                b = Math.max(0, b - 10);

                // 对比度降低
                r = 128 + (r - 128) * 0.85;
                g = 128 + (g - 128) * 0.85;
                b = 128 + (b - 128) * 0.85;

                data[i] = r;
                data[i + 1] = g;
                data[i + 2] = b;
            }
            ctx.putImageData(imageData, 0, 0);

            // 3) 细纹和皱纹（程序化生成）
            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.strokeStyle = '#5a4a3a';
            ctx.lineWidth = 0.6;

            var w = targetW, h = targetH;
            var cx = w * 0.5, cy = h * 0.35; // 面部中心估计

            // 眼角鱼尾纹（左右）
            for (var side = 0; side < 2; side++) {
                var sign = side === 0 ? -1 : 1;
                var ex = cx + sign * w * 0.15;
                var ey = cy - h * 0.02;
                for (var j = 0; j < 6; j++) {
                    ctx.beginPath();
                    var sx = ex + sign * (4 + j * 5);
                    var sy = ey - 4 + j * 2;
                    ctx.moveTo(sx, sy);
                    ctx.quadraticCurveTo(
                        sx + sign * (12 + j * 3),
                        sy - 6 + j * 1.5,
                        sx + sign * (18 + j * 4),
                        sy - 2 + j * 2.5
                    );
                    ctx.stroke();
                }
            }

            // 额头横纹
            ctx.globalAlpha = 0.15;
            for (var k = 0; k < 5; k++) {
                ctx.beginPath();
                var fy = cy - h * 0.18 + k * 6;
                var fw = w * 0.25 + k * 3;
                ctx.moveTo(cx - fw, fy);
                ctx.quadraticCurveTo(cx, fy - 2 + k * 0.5, cx + fw, fy);
                ctx.stroke();
            }

            // 眉间竖纹
            ctx.globalAlpha = 0.14;
            for (var m = 0; m < 3; m++) {
                ctx.beginPath();
                var bx = cx + (m - 1) * 5;
                ctx.moveTo(bx, cy - h * 0.06);
                ctx.lineTo(bx, cy - h * 0.02);
                ctx.stroke();
            }

            // 法令纹（鼻翼到嘴角）
            ctx.globalAlpha = 0.2;
            ctx.lineWidth = 0.8;
            for (var n = 0; n < 2; n++) {
                var nsign = n === 0 ? -1 : 1;
                ctx.beginPath();
                ctx.moveTo(cx + nsign * w * 0.04, cy);
                ctx.quadraticCurveTo(
                    cx + nsign * w * 0.06,
                    cy + h * 0.08,
                    cx + nsign * w * 0.05,
                    cy + h * 0.14
                );
                ctx.stroke();
            }

            // 眼下细纹
            ctx.globalAlpha = 0.12;
            ctx.lineWidth = 0.4;
            for (var p = 0; p < 2; p++) {
                var psign = p === 0 ? -1 : 1;
                for (var q = 0; q < 4; q++) {
                    ctx.beginPath();
                    var ux = cx + psign * w * 0.08 + q * 3;
                    var uy = cy - h * 0.01 + q * 2;
                    ctx.moveTo(ux - 8, uy);
                    ctx.quadraticCurveTo(ux, uy + 2, ux + 8, uy);
                    ctx.stroke();
                }
            }
            ctx.restore();

            // 4) 老年斑（随机小块）
            ctx.save();
            ctx.globalAlpha = 0.08;
            for (var s = 0; s < 30; s++) {
                var sx = Math.random() * w;
                var sy = Math.random() * h * 0.7;
                var sr = 2 + Math.random() * 5;
                ctx.fillStyle = '#5a4030';
                ctx.beginPath();
                ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();

            // 5) 眼下暗沉
            ctx.save();
            ctx.globalAlpha = 0.13;
            for (var es = 0; es < 2; es++) {
                var essign = es === 0 ? -1 : 1;
                var ex2 = cx + essign * w * 0.1;
                var ey2 = cy + h * 0.02;
                var grad = ctx.createRadialGradient(ex2, ey2, 3, ex2, ey2, w * 0.09);
                grad.addColorStop(0, 'rgba(80,50,40,1)');
                grad.addColorStop(0.5, 'rgba(80,50,40,0.5)');
                grad.addColorStop(1, 'rgba(80,50,40,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(ex2, ey2, w * 0.09, h * 0.03, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();

            // 6) 头发变白模拟（检测上方高亮区域并混白）
            var hairData = ctx.getImageData(0, 0, targetW, Math.round(targetH * 0.3));
            var hd = hairData.data;
            for (var hi = 0; hi < hd.length; hi += 4) {
                var brightness = (hd[hi] + hd[hi + 1] + hd[hi + 2]) / 3;
                // 较暗的像素（深色头发）混入灰白色
                if (brightness < 180) {
                    var mixRatio = 0.55;
                    hd[hi]     = hd[hi]     * (1 - mixRatio) + 210 * mixRatio;
                    hd[hi + 1] = hd[hi + 1] * (1 - mixRatio) + 200 * mixRatio;
                    hd[hi + 2] = hd[hi + 2] * (1 - mixRatio) + 190 * mixRatio;
                }
            }
            ctx.putImageData(hairData, 0, 0);

            // 7) 整体轻微模糊
            var blurCanvas = document.createElement('canvas');
            blurCanvas.width = targetW;
            blurCanvas.height = targetH;
            var blurCtx = blurCanvas.getContext('2d');
            blurCtx.filter = 'blur(2px)';
            blurCtx.drawImage(c, 0, 0);
            // 原图 + 模糊图混合（70:30 保持可辨识度）
            ctx.globalAlpha = 0.25;
            ctx.drawImage(blurCanvas, 0, 0);
            ctx.globalAlpha = 1;

            return c;
        }

        // ===== 提示信息 =====
        function showToast(msg) {
            var toast = self.add.text(W / 2, H - 30, msg, {
                fontSize: '14px', color: '#4CAF50', fontStyle: 'bold',
                backgroundColor: 'rgba(0,0,0,0.8)', padding: { x: 12, y: 6 }
            }).setOrigin(0.5).setDepth(100);
            self.tweens.add({
                targets: toast, alpha: 0, y: toast.y - 20,
                duration: 800, delay: 1800,
                onComplete: function() { toast.destroy(); }
            });
        }

        // ===== 返回按钮 =====
        var backBtn = this.add.image(W / 2, H - 25, 'btn_small').setInteractive({ useHandCursor: true }).setDepth(20);
        var backTxt = this.add.text(W / 2, H - 25, '⬅ 返回首页', { fontSize: '15px', fontStyle: 'bold', color: '#333333' }).setOrigin(0.5).setDepth(21);
        backBtn.on('pointerdown', function() {
            AudioFX.click();
            self.cameras.main.fadeOut(300);
            self.time.delayedCall(300, function() { self.scene.start('MenuScene'); });
        });

        this.cameras.main.fadeIn(400);
    }
}

// ==================== 炎夏归途背景音乐（程序化生成）====================
var HeatJourneyBGM = {
    ctx: null,
    masterGain: null,
    playing: false,
    nodes: [],       // 所有活跃的 oscillator/gain 节点
    timerId: null,

    init: function() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch(e) { this.ctx = null; return; }
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.setValueAtTime(0.18, this.ctx.currentTime);
        this.masterGain.connect(this.ctx.destination);
    },

    // 播放一个带淡入淡出的持续音
    _playPad: function(freq, type, startTime, dur, vol) {
        var ctx = this.ctx, t0 = ctx.currentTime + startTime;
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.type = type || 'sine';
        o.frequency.setValueAtTime(freq, t0);
        // vibrato via detune
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        lfo.type = 'sine';
        lfo.frequency.setValueAtTime(0.3 + Math.random() * 0.15, t0);
        lfoG.gain.setValueAtTime(2.5, t0);
        lfo.connect(lfoG);
        lfoG.connect(o.detune);
        lfo.start(t0); lfo.stop(t0 + dur + 0.5);
        this.nodes.push(lfo, lfoG);

        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.6);
        g.gain.setValueAtTime(vol || 0.12, t0 + dur - 0.5);
        g.gain.linearRampToValueAtTime(0, t0 + dur);
        o.connect(g); g.connect(this.masterGain);
        o.start(t0); o.stop(t0 + dur + 0.1);
        this.nodes.push(o, g);
    },

    // 旋律音符
    _playMelodyNote: function(freq, startTime, dur) {
        var ctx = this.ctx, t0 = ctx.currentTime + startTime;
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.type = 'triangle';
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(0.07, t0 + 0.05);
        g.gain.linearRampToValueAtTime(0.001, t0 + dur);
        // gentle reverb via delay
        var dly = ctx.createDelay(0.35);
        dly.delayTime.setValueAtTime(0.28, t0);
        var fbG = ctx.createGain();
        fbG.gain.setValueAtTime(0.25, t0);
        o.connect(g); g.connect(ctx.destination);
        g.connect(dly); dly.connect(fbG); fbG.connect(dly); fbG.connect(ctx.destination);
        o.start(t0); o.stop(t0 + dur + 0.1);
        this.nodes.push(o, g, dly, fbG);
    },

    // 构建一个循环段落
    _buildLoop: function() {
        var self = this;
        // 五声音阶（D 小调五声）：D4 F4 G4 A4 C5 D5
        var pent = [293.66, 349.23, 392.00, 440.00, 523.25, 587.33];
        // 低音和弦根音
        var bassRoots = [146.83, 174.61, 196.00, 220.00]; // D3 F3 G3 A3

        // 低音铺垫（持续和弦）
        var bassDur = 8;
        for (var b = 0; b < 4; b++) {
            var bassF = bassRoots[b % 4];
            // 根音 + 五度
            this._playPad(bassF, 'sine', b * bassDur, bassDur, 0.08);
            this._playPad(bassF * 1.5, 'sine', b * bassDur + 0.05, bassDur - 0.1, 0.05);
        }

        // 高音氛围层
        for (var pad = 0; pad < 2; pad++) {
            this._playPad(bassRoots[pad * 2] * 2, 'sine', pad * 16, 16, 0.04);
        }

        // 旋律线（16 小节）
        var melody = [
            [0, 0], [1, 0.5], [2, 0.5], [1, 0.8], [0, 0.6], [3, 0.6], [2, 1.5], [4, 0.8],
            [5, 0.6], [4, 0.6], [2, 0.5], [0, 1.2], [1, 0.6], [2, 1.0], [3, 0.6], [2, 2.0]
        ];
        var mStart = 0, beatDur = 2.0;
        for (var mi = 0; mi < melody.length; mi++) {
            var noteIdx = melody[mi][0];
            var noteLen = melody[mi][1] * beatDur * 0.8;
            if (noteIdx < pent.length) {
                this._playMelodyNote(pent[noteIdx], mStart, noteLen);
            }
            mStart += melody[mi][1] * beatDur;
        }
        var totalDur = mStart + 1;

        // 延迟后再次调度
        this.timerId = setTimeout(function() {
            if (self.playing) self._buildLoop();
        }, totalDur * 1000);
    },

    play: function() {
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.stop();
        this.playing = true;
        this._buildLoop();
    },

    stop: function() {
        this.playing = false;
        if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
        // 销毁所有活跃节点
        for (var i = 0; i < this.nodes.length; i++) {
            try { this.nodes[i].stop(); } catch(e) {}
        }
        this.nodes = [];
    },

    // 淡出停止
    fadeOut: function(secs) {
        this.playing = false;
        if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
        if (this.masterGain && this.ctx) {
            this.masterGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + (secs || 1.5));
        }
        var self = this;
        setTimeout(function() { self.stop(); }, (secs || 1.5) * 1000 + 200);
    }
};

    // ========== 分阶段叙事 ==========
    _showStoryBeat(beatId) {
        var W = this.cameras.main.width, H = this.cameras.main.height, self = this;
        if (this.milestonesTriggered[beatId]) return;
        this.milestonesTriggered[beatId] = true;

        var stories = {
            'intro': [
                '七月正午，气温 38°C…',
                '老张接到儿子的电话：「爸，今天带孙子回去看您。」',
                '他拄起拐杖，走出家门——得去两条街外的菜市场，买孙子爱吃的排骨。',
                '太阳毒辣辣地烤着马路，空气像着了火…'
            ],
            'mile25': [
                '才走了四分之一，老张的衬衫已经被汗浸透了。',
                '前面有个年轻人边走边刷手机，头也不抬地从他身边擦过。',
                '老张想开口问路，嘴唇动了动，又把话咽了回去…'
            ],
            'mile50': [
                '路程过半，腿像灌了铅。',
                '绿灯亮了，可老张还没走到马路中间就变成了红灯——',
                '司机按着喇叭呼啸而过，热风把他的白发吹得乱七八糟。',
                '他站在路中间，进退两难…'
            ],
            'mile75': [
                '快到了。前面拐个弯就是家门口的小巷。',
                '可这最后一段路怎么这么长呢？',
                '年轻时五分钟就走完的路，现在像翻了一座山…',
                '但他还是笑了——因为孙子在家等着呢。'
            ]
        };

        var lines = stories[beatId];
        if (!lines) return;

        this.isPaused = true;
        var idx = 0;
        var txt = this.add.text(W / 2, H / 2 - 20, '', {
            fontSize: '20px', color: '#FFFFFF', fontStyle: 'bold',
            align: 'center', lineSpacing: 8, wordWrap: { width: 640 },
            backgroundColor: 'rgba(0,0,0,0.82)', padding: { x: 32, y: 20 }
        }).setOrigin(0.5).setDepth(95).setScrollFactor(0);

        var showNext = function() {
            if (idx >= lines.length) {
                txt.destroy();
                self.isPaused = false;
                return;
            }
            txt.setText(lines[idx]);
            idx++;
            self.time.delayedCall(2200, showNext);
        };
        showNext();
    }

    // ========== 纹理 ==========
    _genTextures() {
        var self = this, G = function() { return self.make.graphics({ add: false }); };
        var keys = ['elder_walk', 'elder_walk_0', 'elder_walk_1', 'elder_walk_2', 'elder_walk_3',

            'bench_tex', 'tl_pole', 'home_icon', 'water_bottle', 'tree_tex'];
        for (var k = 0; k < keys.length; k++) {
            if (this.textures.exists(keys[k])) this.textures.remove(keys[k]);

        // ==== 老人走路动画（4帧）====
        var _drawElder = function(g, loL, loR, ayL, ayR, cy) {

            g.fillStyle(0xDDDDDD); g.fillRect(14, 0, 22, 5);

            g.fillStyle(0x333333); g.fillCircle(21, 15, 2); g.fillCircle(29, 15, 2);

            // 白色汗衫

            // 领口
            g.fillStyle(0xE0E0E0); g.fillTriangle(18, 26, 25, 36, 32, 26);
            // 胳膊（带动画偏移）
            g.fillStyle(0xE8C39E); g.fillRoundedRect(1, 28 + ayL, 12, 8, 3);

    // ========== 建筑（大世界版）==========
    _drawBuildings(g, color, alpha, worldW) {
        g.clear();
        var x = 0;
        while (x < worldW) {
            var bw = 40 + Math.floor(Math.random() * 55);
            var bh = 50 + Math.floor(Math.random() * 110);
            g.fillStyle(color, alpha); g.fillRect(x, 330 - bh, bw, bh);
            g.fillStyle(0x88CCFF, alpha * 0.45);
            for (var wy = 340 - bh; wy < 322; wy += 16) {
                for (var wx = x + 7; wx < x + bw - 10; wx += 14) {
                    if (Math.random() > 0.32) g.fillRect(wx, wy, 8, 10);
                }
            }
            x += bw + 3;
        }
    }

    // ========== 获取相机前方世界坐标 ==========
    _camAhead(offset) {
        var cx = this.cameras.main.scrollX;
        return cx + 1920 + (offset || 0);
    }
    _camBehind() {
        return this.cameras.main.scrollX - 480;
    }

    // ========== 生成长椅（附带树荫）====
    _spawnBench() {
        var bx = this._camAhead(80 + Math.random() * 280);
        var bench = this.add.image(bx, 524, 'bench_tex').setDepth(19);
        this.benches.push(bench);
        var tree = this.add.image(bx, 465, 'tree_tex').setDepth(18).setScale(0.8);
        bench._tree = tree;
        this.shadeZones.push({ x: bx, width: 70 });
    }

    // ========== 生成水瓶 ==========
    _spawnWater() {
        var wx = this._camAhead(200 + Math.random() * 450);
        var bottle = this.add.image(wx, 510, 'water_bottle').setDepth(17).setScale(0.9);
        bottle.isCollected = false;
        this.waterBottles.push(bottle);
    }

    // ========== 生成NPC ==========
    _spawnNPC() {
        var variants = ['npc_man1', 'npc_woman1', 'npc_bike', 'npc_umbrella'];
        var tex = variants[Math.floor(Math.random() * variants.length)];
        var side = Math.random() > 0.5 ? 1 : -1;
        var nx = side > 0 ? this._camAhead(Math.random() * 400) : this._camBehind();

        var baseSpeed, baseY, scale;
        if (tex === 'npc_bike') {
            baseSpeed = 200 + Math.random() * 120; baseY = 498; scale = 0.72;
        } else if (tex === 'npc_umbrella') {
            baseSpeed = 60 + Math.random() * 50; baseY = 494; scale = 0.68;
        } else {
            baseSpeed = 100 + Math.random() * 80; baseY = 504; scale = 0.7;
        }
        var npc = this.add.image(nx, baseY, tex).setDepth(18).setScale(scale);
        npc.speed = baseSpeed;
        if (side > 0) npc.speed = -npc.speed;
        npc.hasHelped = false;
        npc.texKey = tex;
        this.npcs.push(npc);
    }

    // ========== 生成交通灯 ==========
    _spawnLight() {
        var lx = this._camAhead(180 + Math.random() * 380);
        var pole = this.add.image(lx, 552, 'tl_pole')
            .setOrigin(0.5, 1.0).setDepth(21);
        pole.tlTopY = 552 - 140;  // 纹理顶部世界y (140=纹理高)
        // 所有灯初始为红，靠计时器自动切换
        pole.isRed = true;
        pole.stateTimer = 1.5 + Math.random() * 4;
        pole.isTransitioning = false;
        pole.transTimer = 0;
        pole.redGfx    = this.add.graphics().setDepth(22);
        pole.yellowGfx = this.add.graphics().setDepth(22);
        pole.greenGfx  = this.add.graphics().setDepth(22);
        pole.passed = false;
        pole.blockingPlayer = false;
        this.lights.push(pole);
    }

    // ========== HUD ==========
    _updateHUD() {
        var W = this.cameras.main.width;
        var pct = Math.max(0, this.stamina / this.maxStamina);
        this.staminaBarBg.clear();
        this.staminaBarBg.fillStyle(0x333333, 0.7);
        this.staminaBarBg.fillRoundedRect(28, 28, 295, 10, 4);
        this.staminaBar.clear();
        var sc = pct > 0.5 ? 0x4CAF50 : (pct > 0.2 ? 0xFFD93D : 0xFF4444);
        this.staminaBar.fillStyle(sc, 1);
        this.staminaBar.fillRoundedRect(28, 28, 295 * pct, 10, 4);
        this.scoreText.setText('⭐ 得分: ' + this.score);

        var dp = Math.min(1, this.distance / this.goalDistance);
        this.distBarBg.clear();
        this.distBarBg.fillStyle(0x333333, 0.7);
        this.distBarBg.fillRoundedRect(W - 354, 42, 320, 10, 4);
        this.distBar.clear();
        this.distBar.fillStyle(0x4488FF, 1);
        this.distBar.fillRoundedRect(W - 354, 42, 320 * dp, 10, 4);
        this.distLabel.setText('🏠 归家路 ' + Math.floor(dp * 100) + '%');

        if (this.stamina <= 0) {
            this.restHint.setText('⚠ 必须休息！找到长椅');
        } else {
            this.restHint.setText('');
        }
    }

    // ========== 休息 ==========
    _startRest() {
        if (this.isResting || this.gameOver) return;
        this.isResting = true;
        this.restCount++;
        this.score += 10;
        var W = this.cameras.main.width, H = this.cameras.main.height;

        var mem = this.memories[this.memoryIndex % this.memories.length];
        this.memoryIndex++;

        this.restPanel.clear();
        this.restPanel.setAlpha(1);
        this.restPanel.fillStyle(0x000000, 0.88);
        this.restPanel.fillRoundedRect(W / 2 - 400, H / 2 - 250, 800, 500, 22);
        this.restPanel.lineStyle(2, 0xFFD93D, 0.55);
        this.restPanel.strokeRoundedRect(W / 2 - 400, H / 2 - 250, 800, 500, 22);

        this.restText.setAlpha(1);
        this.restText.setText('🌳 第 ' + this.restCount + ' 次坐下休息\n\n' +
            '树荫下总算凉快了些。\n老人闭上眼睛，\n想起了年轻时的自己：\n\n' + mem);

        this.restSub.setAlpha(1);

        var self = this;
        this.restAnim = this.tweens.addCounter({
            from: this.stamina, to: this.maxStamina,
            duration: 2800, delay: 400,
            onUpdate: function(t) { self.stamina = Math.floor(t.getValue()); self._updateHUD(); }
        });

        this.benchPrompt.setAlpha(0);
    }

    _endRest() {
        if (!this.isResting) return;
        this.isResting = false;
        this.stamina = this.maxStamina;
        this._updateHUD();
        this.restPanel.setAlpha(0);
        this.restText.setAlpha(0);
        this.restSub.setAlpha(0);
        if (this.restAnim) { this.restAnim.destroy(); this.restAnim = null; }
    }

    // ========== 显示独白 ==========
    _showMonologue(text) {
        this.monologueText.setText(text);
        this.monologueText.setAlpha(1);
        var self = this;
        this.tweens.add({
            targets: this.monologueText, alpha: 0, duration: 400, delay: 3500,
            onComplete: function() { self.monologueText.setText(''); }
        });
    }

    // ========== 完成 ==========
    _finish() {
        this.gameOver = true;
        this.isResting = true;
        this.isPaused = true;

        var W = this.cameras.main.width, H = this.cameras.main.height, self = this;
        this.finishPanel.setAlpha(1);
        this.finishPanel.fillStyle(0x000000, 0.9);
        this.finishPanel.fillRoundedRect(W / 2 - 440, H / 2 - 280, 880, 560, 24);
        this.finishPanel.lineStyle(3, 0xFFD93D, 0.7);
        this.finishPanel.strokeRoundedRect(W / 2 - 440, H / 2 - 280, 880, 560, 24);

        this.finishText.setAlpha(1);
        this.finishText.setText(
            '🏠 终于到家了！\n\n老张推开门，小孙子扑过来抱住他的腿——\n「爷爷！我给你留了西瓜！」\n' +
            '一阵凉风从窗户吹进来，\n客厅里儿子的声音传来：「爸，先坐下歇会儿。」\n\n' +
            '这一路，他坐下休息了 ' + this.restCount + ' 次，\n' +
            '经过了 ' + this.lightPassed + ' 个红绿灯，\n' +
            '与 ' + this.npcPassed + ' 位年轻人擦肩而过…\n\n' +
            '最终得分：⭐ ' + this.score + '\n\n' +
            '💛 每一个老去的背影，都曾年轻过——\n请在你力所能及的时候，伸出一只手。');

        var btn = this.add.image(W / 2, H / 2 + 250, 'btn_small')
            .setInteractive({ useHandCursor: true }).setDepth(105).setScrollFactor(0);
        var btnT = this.add.text(W / 2, H / 2 + 250, '⬅ 返回首页', {
            fontSize: '18px', fontStyle: 'bold', color: '#333333'
        }).setOrigin(0.5).setDepth(106).setScrollFactor(0);

        btn.on('pointerdown', function() {
            HeatJourneyBGM.fadeOut(0.8);
            self.cameras.main.fadeOut(400);
            self.time.delayedCall(400, function() { self.scene.start('MenuScene'); });
        });
    }

    // ========== UPDATE ==========
    update(time, delta) {
        if (this.gameOver || this.isPaused) return;
        var W = this.cameras.main.width, H = this.cameras.main.height, dt = delta / 1000, self = this;
        var cam = this.cameras.main;
        var camRight = cam.scrollX + W;

        // --- 全屏切换（F键，随时可用）---
        if (Phaser.Input.Keyboard.JustDown(this.keyF11)) {
            if (this.scale.isFullscreen) {
                this.scale.stopFullscreen();
            } else {
                this.scale.startFullscreen();
            }
        }

        // --- 休息中 ---
        if (this.isResting) {
            if (Phaser.Input.Keyboard.JustDown(this.keySpace)) this._endRest();
            return;
        }

        // --- ESC 返回菜单 ---
        if (Phaser.Input.Keyboard.JustDown(this.keyESC)) {
            HeatJourneyBGM.fadeOut(0.6);
            this.cameras.main.fadeOut(400);
            this.time.delayedCall(400, function() { self.scene.start('MenuScene'); });
            return;
        }

        // --- 玩家移动（世界坐标）---
        var moveSpeed = this.stamina > 0 ? this.gameSpeed : (this.gameSpeed * 0.25);
        var playerVX = 0;
        if (this.cursors.left.isDown)  playerVX = -moveSpeed;
        if (this.cursors.right.isDown) playerVX = moveSpeed;

        this.playerWorldX += playerVX * dt;
        this.playerWorldX = Phaser.Math.Clamp(this.playerWorldX, 40, this.worldWidth - 40);
        this.player.x = this.playerWorldX;

        // 距离 = 玩家世界位置
        this.distance = Math.max(0, this.playerWorldX - 200);
        this.heatIntensity = 1 + (this.distance / this.goalDistance) * 1.2;

        // 走路动画（4帧循环 + 身体弹跳）
        if (Math.abs(playerVX) > 0) {
            this.walkTime += dt;
            var frameIdx = Math.floor(this.walkTime * 5.5) % 4;
            this.player.setTexture('elder_walk_' + frameIdx);
            this.player.y = 516 + Math.sin(this.walkTime * 7) * 2;
            this.player.setFlipX(playerVX < 0);
        } else {
            this.player.y = 516;
            this.player.setTexture('elder_walk_1');
        }

        // --- 体力消耗（树荫下减半）---
        var inShade = false;
        for (var si = 0; si < this.shadeZones.length; si++) {
            var sz = this.shadeZones[si];
            if (Math.abs(sz.x - this.playerWorldX) < sz.width * 0.5) { inShade = true; break; }
        }
        var drainRate = this.staminaDrainBase * (playerVX !== 0 ? 1.3 : 1.0) * (inShade ? 0.45 : 1.0);
        if (this.stamina > 0) {
            this.stamina = Math.max(0, this.stamina - drainRate * dt);
        }

        // --- 低体力警告 ---
        var warnAlpha = this.stamina > 0 && this.stamina < 25 ? (0.35 - this.stamina / 70) : 0;
        this.warningOverlay.clear();
        if (warnAlpha > 0) {
            this.warningOverlay.fillStyle(0xFF2200, warnAlpha);
            this.warningOverlay.fillRect(0, 0, W, H);
        }
        if (this.stamina <= 0) {
            this.warningText.setAlpha(0.8);
            this.warningText.setText('❗ 体力耗尽！请找到路边长椅休息');
        } else if (warnAlpha > 0) {
            this.warningText.setAlpha(warnAlpha);
            this.warningText.setText('⚠ 体力不足，需要休息…');
        } else {
            this.warningText.setAlpha(0);
        }

        // --- 长椅检测 ---
        this.benchNearby = false;
        this.currentBench = null;
        var benchRemove = [];
        for (var bi = this.benches.length - 1; bi >= 0; bi--) {
            var b = this.benches[bi];
            if (b.x < this._camBehind()) {
                if (b._tree) b._tree.destroy();
                b.destroy();
                this.benches.splice(bi, 1);
                continue;
            }
            var dist = Math.abs(b.x - this.playerWorldX);
            if (dist < 50) {
                this.benchNearby = true;
                this.currentBench = b;
                this.benchPrompt.setPosition(b.x, 490);
                this.benchPrompt.setAlpha(0.9);
                if (Phaser.Input.Keyboard.JustDown(this.keySpace)) this._startRest();
            } else if (dist < 90) {
                this.benchPrompt.setAlpha(0.3);
            }
        }
        if (!this.benchNearby && this.benchPrompt.alpha > 0) {
            this.benchPrompt.setAlpha(Math.max(0, this.benchPrompt.alpha - 3 * dt));
        }

        // --- 自动生成 ---
        if (this.benches.length < 3 && this.playerWorldX > this.lastSpawnX - 600) {
            this._spawnBench();
            this.lastSpawnX = this.playerWorldX;
        }

        // --- 水瓶 ---
        this.waterTimer += dt;
        if (this.waterTimer > 5 + Math.random() * 7 && this.waterBottles.length < 3) {
            this.waterTimer = 0; this._spawnWater();
        }
        for (var wi = this.waterBottles.length - 1; wi >= 0; wi--) {
            var wb = this.waterBottles[wi];
            if (wb.x < this._camBehind() || wb.isCollected) {
                wb.destroy(); this.waterBottles.splice(wi, 1); continue;
            }
            if (!wb.isCollected && Math.abs(wb.x - this.playerWorldX) < 28) {
                wb.isCollected = true;
                this.stamina = Math.min(this.maxStamina, this.stamina + 30);
                this.score += 5; this._updateHUD();
                this._showMonologue('💧 捡起一瓶水，凉凉的…\n「真好，还有好心人放的爱心水」');
                wb.destroy(); this.waterBottles.splice(wi, 1);
            }
        }

        // --- NPC ---
        this.npcTimer += dt;
        if (this.npcTimer > 2 + Math.random() * 3) { this.npcTimer = 0; this._spawnNPC(); }
        for (var ni = this.npcs.length - 1; ni >= 0; ni--) {
            var n = this.npcs[ni];
            n.x += n.speed * dt;
            if (n.x > camRight + 80 || n.x < this._camBehind() - 80) {
                if (n.x < this.playerWorldX && n.speed > 0) this.npcPassed++;
                n.destroy(); this.npcs.splice(ni, 1);
            }
        }

        // --- 交通灯 ---
        this.lightTimer += dt;
        if (this.lightTimer > 3.5 + Math.random() * 5) { this.lightTimer = 0; this._spawnLight(); }
        for (var li = this.lights.length - 1; li >= 0; li--) {
            var l = this.lights[li];
            l.redGfx.clear(); l.yellowGfx.clear(); l.greenGfx.clear();
            var blurA = 0.25 + Math.sin(time * 0.0018 + li) * 0.12 + Math.random() * 0.04;
            // 纹理 42x140，origin(0.5,1.0)=底对齐，灯位纹理y: 10/18/26，x偏移+6
            var ox = l.x + 6;
            var ry = l.tlTopY + 10, yy = l.tlTopY + 18, gy = l.tlTopY + 26;
            // -- 光线切换逻辑 --
            if (l.isRed && !l.isTransitioning) {
                l.stateTimer -= dt;
                if (l.stateTimer <= 0) {
                    l.isTransitioning = true;
                    l.transTimer = 0.6;
                }
            }
            if (l.isTransitioning) {
                l.transTimer -= dt;
                if (l.transTimer <= 0) {
                    l.isRed = false;
                    l.isTransitioning = false;
                }
            }
            // -- 绘制叠层 --
            var blink = l.isTransitioning ? (Math.floor(time * 12) % 2 === 0) : false;
            if (l.isRed) {
                var rA = 1, rB = blurA * 0.7;
                if (blink) { rA = 0.3; rB = 0.15; }
                l.redGfx.fillStyle(0xFF0000, rA); l.redGfx.fillCircle(ox, ry, 7);
                l.redGfx.fillStyle(0xFF4444, rB); l.redGfx.fillCircle(ox, ry, 13);
                l.yellowGfx.fillStyle(0x886600, blink ? 0.7 : 0.25); l.yellowGfx.fillCircle(ox, yy, blink ? 6 : 4.5);
                l.greenGfx.fillStyle(0x003300, 0.25); l.greenGfx.fillCircle(ox, gy, 4.5);
            } else if (l.isTransitioning) {
                l.redGfx.fillStyle(0x440000, 0.3); l.redGfx.fillCircle(ox, ry, 4.5);
                l.yellowGfx.fillStyle(0xFFCC00, blink ? 1 : 0.4); l.yellowGfx.fillCircle(ox, yy, blink ? 7 : 5.5);
                if (blink) { l.yellowGfx.fillStyle(0xFFEE44, blurA); l.yellowGfx.fillCircle(ox, yy, 13); }
                l.greenGfx.fillStyle(0x003300, 0.25); l.greenGfx.fillCircle(ox, gy, 4.5);
            } else {
                l.redGfx.fillStyle(0x440000, 0.3); l.redGfx.fillCircle(ox, ry, 4.5);
                l.yellowGfx.fillStyle(0x886600, 0.2); l.yellowGfx.fillCircle(ox, yy, 4);
                l.greenGfx.fillStyle(0x00FF00, 1); l.greenGfx.fillCircle(ox, gy, 7);
                l.greenGfx.fillStyle(0x44FF44, blurA * 0.7); l.greenGfx.fillCircle(ox, gy, 13);
            }
            // -- 红灯阻挡：玩家不能向右穿过红灯 --
            l.blockingPlayer = false;
            var lightBlockX = l.x - 25;  // 阻挡线（灯杆前方）
            if ((l.isRed || l.isTransitioning) && !l.passed) {
                // 玩家在阻挡区附近
                if (this.playerWorldX > lightBlockX - 15 && this.playerWorldX < l.x + 60) {
                    l.blockingPlayer = true;
                    // 阻止向右穿过 — 把玩家推回阻挡线前
                    this.playerWorldX = Math.min(this.playerWorldX, lightBlockX - 15);
                    this.player.x = this.playerWorldX;
                }
                // 红灯光晕下体力微微消耗
                if (Math.abs(l.x - this.playerWorldX) < 35) {
                    this.stamina = Math.max(0, this.stamina - 0.3 * dt);
                }
            }
            // 绿灯通过
            if (!l.isRed && !l.passed && this.playerWorldX > l.x && Math.abs(l.x - this.playerWorldX) < 60) {
                l.passed = true; this.lightPassed++; this.score += 3;
            }
            // 清理
            if (l.x < this._camBehind()) {
                l.redGfx.destroy(); l.yellowGfx.destroy(); l.greenGfx.destroy(); l.destroy();
                this.lights.splice(li, 1);
            }
        }

        // --- 红灯等待提示 ---
        var anyBlocking = false, blockingX = 0, promptY = 0;
        for (var bli = 0; bli < this.lights.length; bli++) {
            if (this.lights[bli].blockingPlayer) {
                anyBlocking = true;
                blockingX = this.lights[bli].x;
                promptY = this.lights[bli].tlTopY - 15;
                break;
            }
        }
        if (anyBlocking) {
            var remain = 0;
            for (bli = 0; bli < this.lights.length; bli++) {
                var bl = this.lights[bli];
                if (bl.blockingPlayer) { remain = Math.max(remain, bl.isTransitioning ? bl.transTimer : bl.stateTimer); }
            }
            this.redLightPrompt.setPosition(blockingX, promptY);
            this.redLightPrompt.setText('🛑 红灯！还需等待 ' + Math.ceil(remain) + ' 秒…');
            this.redLightPrompt.setAlpha(0.9);
        } else {
            if (this.redLightPrompt.alpha > 0) {
                this.redLightPrompt.setAlpha(Math.max(0, this.redLightPrompt.alpha - 4 * dt));
            }
        }

        // --- 热浪 ---
        this.heatTimer += dt;
        this._drawHeatEffect(time);

        // --- 内心独白 ---
        this.monoTimer += dt;
        if (this.monoTimer > this.nextMonoDelay && this.stamina > 0 && !this.isResting) {
            this.monoTimer = 0; this.nextMonoDelay = 10 + Math.random() * 12;
            var monos = ['「天真热啊…」','「再走一会儿就到了…」','「这腿越来越不听话了…」',
                '「小孙子该等急了吧…」','「得买最新鲜的排骨…」','「年轻人都走得真快啊…」',
                '「前面好像有个长椅…」','「这点路，以前五分钟就走完了…」'];
            this._showMonologue(monos[Math.floor(Math.random() * monos.length)]);
        }

        // --- 里程碑 ---
        var dpPct = this.distance / this.goalDistance;
        if (dpPct > 0.25 && !this.milestonesTriggered['mile25']) this._showStoryBeat('mile25');
        if (dpPct > 0.50 && !this.milestonesTriggered['mile50']) this._showStoryBeat('mile50');
        if (dpPct > 0.75 && !this.milestonesTriggered['mile75']) this._showStoryBeat('mile75');

        // --- 到达 ---
        if (this.distance >= this.goalDistance) this._finish();

        this._updateHUD();
    }

    // ========== 热浪效果（增强）==========
    _drawHeatEffect(time) {
        var W = this.cameras.main.width, H = this.cameras.main.height, ctx = this.heatCtx;
        ctx.clearRect(0, 0, W, H);

        var intensity = this.heatIntensity || 1;

        // 水平热浪波纹
        ctx.globalAlpha = 0.06 * intensity;
        for (var y = 270; y < 530; y += 2) {
            ctx.strokeStyle = Math.random() > 0.5 ? '#FF7733' : '#FFD488';
            ctx.lineWidth = 0.4 + Math.random() * 1.2;
            ctx.beginPath();
            for (var x = 0; x < W; x += 16) {
                var ox = x + Math.sin(time * 0.004 + y * 0.05 + x * 0.006) * 5 * intensity;
                var oy = y + Math.sin(time * 0.003 + x * 0.004) * 1.5;
                if (x === 0) ctx.moveTo(ox, oy); else ctx.lineTo(ox, oy);
            }
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // 底部热气团
        ctx.globalAlpha = 0.05 * intensity;
        for (var i = 0; i < 18; i++) {
            var hx = (time * 0.025 + i * 57) % (W + 200) - 100;
            var hy = 510 - ((time * 0.018 + i * 41) % 240);
            ctx.fillStyle = '#FFEEDD';
            ctx.beginPath();
            ctx.ellipse(hx, hy, 25 + Math.random() * 22, 5 + Math.random() * 4, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        if (this.heatTexture) this.heatTexture.refresh();
    }
}
